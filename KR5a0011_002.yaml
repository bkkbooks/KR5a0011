front:
  text: 高上玉皇本行集經卷中盈五
  hash: sha256:14111c0745cac06d02a41203528b6e1035b17edaf8e55e517911c3b56793234d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0011_HFL_002-001a, image: hfl/0024/0024-005.png}
body:
  text: 天樞上相臣張良校正太上大光眀圓滿大神呪品第二爾時天地始祖五老上帝稽首長跪白天尊言伏聞高上玉皇一本云天尊高上玉皇竊見放光事専屬玉皇今略天尊二字慈念蒼生普放神光照燭法界六凡四聖普叨道蔭竊以凡夫短景劫運將終正道宜行以濟兆民使修真之子有期輕舉末代蒸民俱獲夀考自昔元始洞玄靈寶赤書玉篇真文生於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗無氣無象無色無名無形無緒無音無聲混沌太無靈文暗曖乍存乍亡二儀待之以分太陽待之以眀靈圖革運玄象推遷乘機應運於是存焉玉帝授臣靈寶祕篆大不可思議神呪故天地得之而分判三景得之而發光靈文鬱秀洞映上清發乎始青之天而色無定方支勢曲折不可尋詳元始鍊之於洞陽之館冶之於流火之庭鮮其正文瑩發光芒洞陽氣赤故號赤書靈圖既煥萬帝朝真飛空步虛旋行上宮燒香散花口詠靈章是時天降十二玄瑞地發二十四應上慶九天之靈奧讃三天之寶眀神風既鼓皇道咸暢元始登命太真按筆玉妃拂筵鑄金為簡刻書玉篇五老掌籙祕於九天靈都之館玉女典香太華執巾玉童侍衛玉陛朝軒九天上書非鬼神所聞故天寶之以致浮地祕之以致安五帝掌之以得鎮三光乘之以高明上聖奉之以致神高尊掌之以致真五嶽從之以得靈天子得之以致治國祚享之以太平實靈文之妙德乃天地之玄根威靈恢廓普加無窮蕩蕩大化為神明之宗其量莫測巍巍乎太空明真有格今當以行是時元始革運玄象開圖靈文鬱秀神表五方分判天地開化萬靈此大宗之業可得暫披於靈韞乎今皇道敷暢澤被十方仰觀劫運真風宜行臣私心實欲使靈蔭八遐風灑蘭林寒條仰希華陽之繁朽骸蒙受靈奧之津仰對元慈下伸丹懇惟願哀憫撫念蒼生不審靈寶玉篇真文可得見授下教於未聞者乎於是元始天尊撫几高抗凝真遐想觀時已至普謂時會一切真聖論定隂陽推數劫㑹移校河源檢録天度選擇種人指拈太無嘯朗九玄永無開聽於陳辭有若閉礙求真之路是時五老上帝啓問不已良久元始天尊乃垂盻眥之容慨爾歎曰惟乎深哉子今所扣豈不逺乎此元始靈寶之玄根空洞自然之真文生天立地開化神明施鎮五嶽安國康良靈寶玄妙為萬物之尊天發玄瑞靈應自然今三天盩運六天道行雜法開化當有三萬六千種道以擇來者之心此法運訖三龍之後庚子之年雜氣普消諸天慶㑹吾真道乃行今且可相付當録於上館未得行於下世玄科有禁不得便傅子可詣靈都紫微上宮視天音於金格取俯仰於神王然後當使得備天文以總御元始之天也於是五老上帝與諸真聖清香執戒徘徊雲路嘯命十天上詣上清太玄玉都寒靈丹殿紫微上宮受俯仰之格乃知天真貴重難可即聞還乃更詣元始天尊語以禁戒之儀遜謝不逮是時天尊慈顔愍喻靈關廓開登命五老上帝開洞陽玉館披九光八色之韞雲錦之囊出元始靈寶赤書玉篇真文金書玉篆微妙祕密運御乾坤大光眀圓滿大神呪玉章以付五老上帝及諸真聖使依玄科按法以傳臣謹言曰臣竊見五太未兆之初二氣未始判也萬類未始形也恭惟元始上帝凝道氣於混茫列真書於杳漠神風交扇二氣乃分二氣既分萬類乃兆然後降已凝之道氣錫已列之真書寓為河洛之文以立人道以治三才已凝之道氣已列之真書即今世間所謂真文靈符者是也然真文之大者以之判天地以之運隂陽山河之流峙人物之生成皆真文之所為也是乃造化之機緘天地之神用兹未始傅於下世也惟度人弭災制魔之篆今見於世焉即神呪品中諸品呪文是也但經之行世傳於上真受於下仙傳之者非一真受之者非一人故語言之詳略意義之精粗間有可得而議者焉如神呪品啓關之文或詳或略或言有未倫或意有弗貫世之誦者每每致疑臣仰奉玉音繆職參校欲行裁益深自憂虞蓋恐裁益之文既行而世間念誦之疑轉熾輒從舊本略證乖訛其他意義之失貫辭語之未倫俱不敢議惟世間之經其略者恐包括之未盡其詳者頗終始之周密敢潔詳者一本為正俾人世即此而誦持焉臣良謹言是時東方安寶華林青靈始老蒼帝所受神呪誥命東方九氣始皇青天碧霞鬱壘中有老人總校圖籙攝氣舉仙右篆是前二十四字青帝祕文書于九天元臺主召九天上帝校神仙圖籙歲星輔肝角亢鎮真氏房心尾四景回旋箕主七辰正斗明輪承氣捕非掃除災羣右篆是前三十二字祕文書于紫微宮東華殿主召星官正天分度東山神呪攝名九天赤書符命制會酆山束魔送鬼所誅無蠲悉詣木宮敢有稽延右篆是前三十二字祕文書于東華玄靈之館主攝鬼魔正九天氣下制東河溟海水神大劫洪災蛟龍負身水府開道通徑百千上帝赤文風火無間右篆是前三十二字祕文書于九天東北玉闕丹臺主攝東海水帝大劫洪災召蛟龍及水神事欲免水災用黃書此字於青紙上別呪投水中解難也右東方九氣靈寶玉篇真文合一百二十字皆太上無上大光明圓滿大神呪空洞自然之書一名生神寶真洞玄章一名東山神呪一名青帝八威策文東方青帝符靈寶九氣天文化生赤帝氣三天九真太空尊神右少陽之氣化生太陽三氣丹天主小劫巳大劫午運周赤帝行佩此文得度其災符文如前當依此以朱筆書于青繪九寸上東方安寶華林青靈始老蒼帝符命日月以定山林以開三天大慶羣真徘徊右元陽之氣生九氣青天寶東方青帝治九九八十一周則九天之氣交為大劫更始佩此文則與運推移得度洪災當以青筆書文白繪上元始青帝真符召直符區更生守靈寶天文道士吞之靈氣鎮肝生青精寶華九葉神為役使通靈致神仙直符區更生無上大真右上始天光文出青帝真文篇以安東方九氣之天青帝受此文以鎮東嶽封一通藏九靈洞室四萬劫一開修真之子命屬東嶽青書絳繪佩身并本命日朱書向東服之九枚直符吏區更生隨符入腹肝臟之中九年皆生青精寶華九重光映于形外又當青書絳繪內神杖次黑帝上節中青衣玉女九人持衛勿致不精當有考吏修真之子佩服前符篆東向叩齒九通想青氣入肝中生九重華光徹映項後書符置前乃呪曰無上青精九氣大靈神光遐散流映東青華景鬱勃灌我身形宮府安鎮寶魂自生洞逹八朗飛升玉庭前訣說别呪者此呪是也東方安寶華林青靈始老蒼帝三元符命九駕命天龍符保真多川災水不敢彌天右九氣青天下元小陽九已小百六午其年大災除民靈寶青帝出下元符命下東嶽保存萬物安國康民制九氣青天分度以度學者之身青書白繪中山神呪易為神臣度人命籍萬災不纏右中元太陽九申大百六酉其年禾稼俱衰青帝出中元符下東嶽蔭育萬物制天分度以度種人大災青書白繪西山上王命為保真一人有道位事九真右上元大劫交周天地改易金玉山海人良鳥獸一時滅盡天地溟涬無復光眀青帝出上元符下東嶽保存萬物制九天氣以度學者其三元符命保固青天元始之氣佩之皆得始分之中其此文九千年一出東嶽青帝云大劫交周當刻書金札以佩身青書白繪右玉皇誥命以錫東方安寶華林青靈始老蒼帝九氣天君令統御東方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊真仙聖衆一切威靈符命所臨如誥奉行南方梵寶昌陽丹靈真老赤帝所受神呪誥命南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三氣勃光神仙受命應㑹太陽右篆是前三十二字赤帝祕文書于九天洞陽之館主召九天神仙圖籙金名熒惑輔心井鬼守房柳星張翼亢御四鄉軫總七宿回轉天常召運促㑹正道驛行右篆是前三十二字祕文書于三氣丹臺主召星官明度數正天分赤文命靈北攝酆山束送魔宗斬滅邪根符教所討明列罪原南山神呪威伏八方羣妖滅爽萬弒摧亡右籙是前四十字祕文書于西南陽正玉闕主制北酆正鬼氣南海水帝太伯龍王神呪流行普掃不祥洪水飛災止蛟召龍開除水徑千道萬通敢有干弒攝送火宮赤書所告莫有不從右篆是前四十八字祕文書于西南陽正西闕主攝南海水帝大運交期洪水四出召蛟龍及水神事右南方三氣靈寶玉篇真文合一百五十二字皆太上無上大光明圓滿大神呪空洞自然之書一名南雲通天寶靈矜一名九天無上之上呪一名赤帝八威策文南方赤帝符靈實三氣天文化生黃帝氣王事司斗正屯尸身右太陽之氣化生中央一氣黃天主小劫丑未大劫辰戌九天氣交黃帝行佩此文防陽九之災符如前文當以黃筆書于絳繪三寸之上南方梵寶昌陽丹靈真老赤帝符命玉音吐氣素奏以御保命定仙玉曆定封右洞陽之氣生三氣丹天寶南方赤帝治九九運周陽氣激大劫終佩此文度災橫見太平以丹筆書之元始赤帝真符召直符昌中守靈寶天文道士吞之靈氣鎮心生丹精寶華三葉神為役使通靈致神仙直符昌中止道統御右上陽明文出赤帝真文篇以安南方三氣之天赤帝受此文以鎮南嶽封一通南霍山阿四萬劫一開道士命屬南嶽赤書黃繪佩身并本命日朱書向南服之三枚直符祝昌中隨符入腹心府之中三年皆生赤精寶華三重光映于形外又當赤書黃繪內神杖次青帝下節中太丹玉女三人侍衛勿致不精當有考吏修真之子佩服前符篆南向叩齒三通想赤氣入心中生三重華光徹映胸後書符置前呪曰丹華流映寶芝生光神精徹幽散靈八方直符攝氣嘯命朱童三精敷煥注我絳宮赤神安鎮五香溢充洞映形外表裏發光身生水火獨步飛行前訣說别呪者此呪是也南方梵寶昌陽丹靈真老赤帝三元符命正一命人長生上天右三氣丹天下元小陽九辰戌小百六丑未其年土中生火萬物自死靈寶赤帝出下元符下南嶽保存萬物安國康民制三氣丹天分度以度學者之身赤書黑繪萬川洪流符吏水毋竭焉右中元大陽九亥大百六子其年火滅水出赤帝出中元符下南嶽度兆民災制天分度消滅水火之厄赤書黑繪日月力出王平山東火災不起人民臣右上元大劫交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光眀赤帝出上元符下南嶽保度萬物制九天氣以度學者其三元符命保固丹天元始之氣佩之皆得始分之中其此文九千年一出南嶽赤帝云大劫交周當刻書金札以佩身赤書黑繪右玉皇誥命以錫南方梵寶昌陽丹靈真老赤帝三氣天君令統御南方諸天諸地日月星宿名山靈洞水府泉宫上聖高尊真仙聖衆一切威靈符命所臨如誥奉行中央玉寶元靈元老黃帝所受神呪誥命中央總靈黃上天元始生五老中皇高尊攝氣監真總領羣仙典録玄圖宿簡玉文催運上氣普告萬神右篆是前四十字黃帝祕文書于太玄玉寶玄臺主召神仙玉簡宿名總歸仙器鎮星輔脾回度北元魁𩲃主非截邪斬姦𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛傳右篆是前四十字祕文書于玄都玉臺主攝星官正天度數敕攝北帝遏塞鬼門翦除不祥莫有當前右篆是前十六字祕文書于玄都玉臺主攝北帝正天氣檢鬼精中山神呪召龍上雲制㑹黃河九水河源不得怠縱善惡悉分千妖萬姦上對帝君莫有干試太陽激燌赤書玉字宣告普聞右篆是前四十八字祕文書于玄都玉臺四壁以攝中海水帝四泉之水洪災涌溢之數主召水神止蛟龍事右中央一氣靈寶玉篇真文合一百四十四字皆太上無上大光明圓滿大神呪空洞自然之書一名寶劫洞清九天靈書一名黃天大神呪一名黃帝八威策文中央黃帝符靈寶一氣天文化生白帝氣山陽之日