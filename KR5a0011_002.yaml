元玄斗中主攝北方星官正天氣也北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅摧右篆是前二十四字祕文書于北方洞隂朔單鬱絶元臺主攝天魔北帝制伏惡仲萬鬼事九河傾訖鳥毋羣飛蛟龍通道水陌洞開赤文玉書驛龍風馳右篆是前二十四字祕文書于洞隂朔單鬱絶元臺以攝北海水帝制水中萬精主召蛟龍興雲致雨以負身一本云興雲致雨事右北方五氣靈寶玉篇真文合一百二十字皆太上無上大光明圓滿大神呪空洞自然之書一名本命紫微元神生真寶明文一名北山神呪一名黑帝八威制天文北方黑帝符靈寶五氣天文化生青帝氣三氣高王易遷川人司萬言右太隂之氣化生少陽九氣青天主小劫亥大劫子隂氣勃天地周青帝行佩此文度洪流大水之災符文如前當以青筆書于黑繪五寸上以佩身北方洞隂朔單鬱絶五靈玄老帝君符命北斗定命九期景散八極明石玄滋右洞隂之氣生五氣玄天寶北方黑帝治九九交運隂氣勃陽氣激九天氣交天地大災佩此文則免洪流萬厲之中以朱書文元始黑帝真符召直符尹豐守靈寶天文道士吞之靈氣鎮腎生玄精寶華五葉神為役使通靈致神仙直符尹豐開道赦鬼右通明文出黑帝真文篇以安北方五氣之天黑帝受此文以鎮北嶽封一通於玄隂洞室四萬劫一開道士命屬北嶽黑書青繪佩身本命日朱書向南服之五枚直符吏尹豐隨符入腹腎府之中五年皆生黑精寶華五重光映于形外又當黑書青繪內神杖次白帝下節中太玄玉女五人侍衛勿致不精當有考吏修真之子佩服前符篆向北叩齒五通想黑氣入腎府之中生五重華光輝映背後書符而呪曰北上太玄五氣徘徊寶華五重流光煥暉雲景鬱香洞映太微仰注我身腎府鮮開安鎮靈宅萬神總歸身生羽服舉形自飛前訣說别呪者此呪是也北方洞隂朔單鬱絶五靈玄老黑帝三元符命上王適月命天仙戌巳多力士辟水源右五氣玄天下元小陽九寅小百六卯其年洪水運天人民流散靈寶黑帝出下元符下北嶽保存萬物安國康民制五氣玄天分度以度學者身黑書黃繪三命正戊入力人任曰遣患無為君右中元大陽九辰戌大百六丑未其年天地枯旱海底揚塵人民焦死萬無遺一黑帝出中元符下北嶽度兆民制天分度除滅早荒之厄黑書黃繪適百百九君有臣三千此度己身右上元大劫交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光明黑帝出上元符下比嶽保存種民制九天氣以度學者其三元符命保固北方玄天元始之氣佩之皆得始分之中其文九千年一出北嶽黑帝云大劫交周當刻書金札以佩身黑書黃繪右玉皇誥命以錫北方洞隂朔單鬱絶五靈玄老黑帝五氣天君令統御北方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊真仙聖衆一切威靈符命所臨知誥奉行臣謹言曰五老上帝分理五天下地萬生俱屬統治妙道生成之任莫此為專故玉帝初劫畀以度人弭災制魔玉篇真文畀之以接度學仙之人畀之禳救星辰之災又升之息洪流制魔害無非所以厚生成之澤使萬類各得其所也五老既奉之以守其職矣猶恐帝恩之未博生靈之未遂故於玉帝放光之後繼用啓陳挈所受之真文以授下世吁帝心之慈如此其至也而五老能廣而充之豈非上聖之心均於仁愛也歟前五篇真文道書備載書篆之式施行之訣悉詳見於諸經今茲載於本行經者特正文也蓋本行經専主於誦念故正文不可無而雲篆庸可略至若一切諸符九氣諸氣真文三元諸符今並略之刋於經末修行者各當即行之但真篆正文之誦尤當嚴謹蓋此文乃上帝誥命也誥命之宣萬靈聞之莫不稽首儻輕慢苟簡視為常文出入吻唇姑為談戲則懲青之酷當如報應品中之載誦經者宜欽奉之臣良謹言道言是大神呪者元始之妙言玉皇之真誥上清自然之靈書九天始生之玄札空洞之靈章上聖之祕語玉晨之尊典成天立地開張萬真安神鎮靈生成兆民匡御運度保天長存上制天機中檢五靈下策地祗嘯命河源運役隂陽召神使仙此至真之妙文神應自然致天高澄令地固安保鎮五嶽萬品存焉玉帝昔授五老上帝是時五帝跪捧其章祕題靈都之館天真皇人昔書其文掌之於上清真境太玄玉都寒靈丹殿紫微上宮纍經劫運而其文保固天根無有毀淪與運推遷是大神呪混之不濁穢之愈清毀之不滅滅之極明大有之文天真所尊自無真名帝圖刻簡來生斯文隱祕不得窺聞有得之子保萬氣長存勤行修奉刻致神仙臣謹言曰五篇玉書真文神功妙用莫可測量蓋得度人録仙真文而施行之則九天衆真紀名仙籍降氣接度得制星真文而施行之則三光照形列曜削厄形神氣命不罹殞傷得制魔真文而施行之則北酆畏威萬魔束首百邪敬栗弗敢侵馘得制水真文而施行之則萬龍保身水府欽畏劫壞之日可跨蛟蚪而越九霄吁神功妙用果可度量哉但施行之訣别有祕要非世人皆可獲此效也惟學仙之士當倣其訣而服行之故經曰有得之子保萬氣長存勤行修奉刻致神仙臣既職校經不敢不舉其要以告來者伏乞上聖垂鑒臣良謹言洞玄靈寶玉皇功德品第三爾時玉虛上帝白天尊言唯願慈悲願為四衆帝釋等及四梵天王一切諸天一切諸仙及未來一切衆生持是經人說利益事爾時天尊告玉虛上帝言快哉斯問不亦善乎汝以慈悲愍念衆生故請問於我天尊言曰若有三界十方無量國土及國王大臣或兵戈並起疫氣大行水旱蟲蝗凶災饑饉是其國君后妃太子宰輔大臣當發慈悲為其黎庶遍敕國內州縣鎮宰令諸道流清淨嚴潔于其觀內設大齊醮六時行道為轉此經當得國土清平五榖豐熟黎庶安泰臣謹言曰世有言曰干羽不足以釋圍鄉飲不足以息戰此事理之當然者也夫剽悍禍賊始從事於干戈寇賊姦宄始容心於兵革非智術有以過之勇力有以勝之決未可以挫其威虐也乃今玉帝經中謂干戈並起之難當敕國內臣庶命道流誦真經以息之何其迂誕也哉吁是大不然也夫天變上臨則地禍下作干戈兵革莫非自夫隂陽拂逆躔度汨亂乃始流災而起亂今觀往昔之圖讖則可驗也是以經中之訓俾國家值亂則以斯而禳援蓋所以請命上天消天變而息地禍非謂以斯經而止亂也若夫厲兵秣馬髙城深池寧可一日廢哉昔有庸君識見窒昧乃直謂釋老經呪可以禦敵旋罹禍難至貽哂誚迄今為羞良可嘆也今世昧夫凡覩是經率執此為謗毀之自敢因校經而辨之臣良謹言若復有人入諸山林遇毒惡獸但能存想一念真經山神衛護猛獸自退終不害己若入江入海採寶求珍值遇惡風如法持念是此真經風浪頓止安穩逹岸若在軍陳戈戟既接雨刃相交存心默念是此真經是諸惡賊悉自退散若在牢獄枷鎖之中淨心定慮存念真經冤枉自伸即得解脫若為邪精鬼賊衆苦所加如法持念是此真經衆邪逺避自然除愈若人為求嗣息如法尊重持念此經帝敕天曹明撿丹籍九品之內四果仙人運應數合降謫下生為其作子才辨明慧人中尊貴若婦人臨難之月如法持念是此真經即得母子平安生福德男女人所愛敬若為求官進職爵䘵亨逹貴遇人君如法持念是此真經即得職務遷轉子孫榮遇世世不絶若人欲求資財殷富如法奉持是此真經即得財寶充溢衣食自然慶流子孫傅之萬世若人被諸惡星之所照臨困苦牀枕如法持念是此真經是諸惡星返降吉祥若人命過應入地獄注名惡籍父毋師長夫妻男女當為亡人持念真經或安置道場旙花供養即得亡者鬼籍盡除神生淨土同苦罪衆咸蒙護度承斯勝利皆生天上又此經所在之處常有十天至真大聖無極飛天神王侍衛供飬持是經人當得日稱為正一真人是人在處自得十方至真至聖金剛力士澘護其人如護己身若出若入遊行之處百邪避路魔鬼殄除精靈伏藏一切災殃不能侵近是持經人命欲終時更不見諸地獄惡相即見天宮一切玉女持幢下迎而生天上如天福盡下降人間即得千生萬生中常為帝王令國土清平人民樂業兼得為王獲宿性通遵奉大道展轉修持至登道岸是持經人獲福如是又若有持是經人若雨下時起大悲心如法向空念此經三卷一遍其雨所霑面所向方一切衆生五逆十惡一切重罪悉皆消滅一切重病便得痊愈是諸衆生命終之後不墮地獄神生淨土蓮花化生何況持是經者又若有持是經人若行於道路值大風起吹是持經之人觸身之塵是塵所霑一切衆生一如惡業悉皆滅盡更不墮三惡道當生天上故知持經功德不可思議是持經人若在江在河在海沐浴其身是水所霑其中衆生魚鱉黿鼉一切水族是諸衆罪悉得除滅盡此一報之身命過之後更不受胎卵濕化一切等身是持經人口出一切語言或善或惡一切天魔外道聞者皆是清淨法音是持經人若遇諸神廟能為其神誦詠是經是諸鬼神得聞是經即脫鬼趣登真仙道恭敬是人如奉是帝若人在世不孝父母不敬三寶殺生偷盜邪淫妄語作種種極重罪業將命終時若有道心正信衆生于是亡者未氣斷時起大悲心于其頭邊念帝尊號或一七二七三七四七乃至百遍千遍是其亡者生前所造諸不善業悉得消滅更不墮諸惡趣神升九天何況受持是此經者又若復有人自從往劫乃至今身輪轉人天漂沈世域積千愆萬過在於己身若遇是持經人影暫映其身如為帝光之所攝受或與同語或聞其聲如奉帝言道語慰諭彼人罪障永得除滅又若持是經人造作長幡書帝名號于其幡上懸諸長竿或是觀宇或在家庭是幡被諸風吹所指方面一切衆生皆霑勝利一切惡業悉得除滅又若有持是經人書帝名號在一切有聲物上或鐘或磬鈴鐸鐃鈸一切道具法事之屬或以道場或以戲擊或被風觸是聲出時或遠或近一切衆生聞是聲已所有罪障悉得清淨又若有持是經人了悟生死深入山林修真學道或時登臨上山顧望目所及處山林溪谷含生品類有形無形胎卵濕化動植飛潜種種諸類所有罪業永得除滅身心清淨命終生天何況受持是此經者當知是人即是道藏功德身也臣謹言曰天尊之語實而不虛真而不妄其片辭隻字曷嘗若發几世昧者識未通真見不詣遠或於諸經荀有少可議則遂從而疑之以為世無是理也鳴呼是人也奚不詳觀熟究耽研咀味而曲求其旨哉功德品中天尊說持經之人所得功德如所謂死而生天天福之盡當得千生萬生中可為帝王與夫持經之人誦經於雨下之時涉途於風起之際至於沐於水觀於山現於影能畀一切衆生罪惡消除獲大功德以為無有是理彼蓋謂帝王之福高而無踰非誦經之功可得而獲證也况千生萬生常為帝王乎彼又謂誦經之福及一身可也衆生極重過惡四生積愆受報此天憲之確纖毫不移使經百劫而不亡果報猶當自受焉可以誦經之身一歷其所而頓能解脫且獲福德也哉斯人之語蓋知其一而未知其二也且夫行堯之行即堯之身希顏之人亦顔之徒今有人焉於是經也朝於斯夕於斯趨亦趨步亦步於本行經中誦其言行其事咀其華含其英倣十大妙行而服行之敬斷障諸戒而離遠之守之以堅持之以誠愈久而不渝受撓而不變日漸月漬混然與玉帝之身如出於一或陟或降在帝左右則彼身乃帝身也帝身亦彼身也身既混融則功德之成豈有異哉玉帝放光神化若是之廣且大則今兹誦經之人所歷所至其福蔭衆生亦猶帝恩帝光之所暨及也雖然斯言也天尊謂誦持斯經而純與帝合者矣非謂入耳出口徒曰誦念者言也然而自入耳出口誦念不替充而至於與帝之合則正一真人之自稱殆亦未可以表其德操也學士宜思而行之臣良謹言爾時天尊謂玉虛上帝言今我略說未盡其妙若廣說之凡流邪見疑惑不信是經功德窮劫難言爾時玉虛上帝聞是說已心生歡喜不勝踊躍瞻仰慈顔稽首而作頌曰九天之上謂之大羅玉京金闕雲層峩峩中有天帝仁慈惠和至道無敵降伏衆魔天寶靈符玉律金科神仙億萬幢旙衆多聞者罪滅永出愛河是號玉皇穹蒼真老妙圓清淨智慧辨才至道至尊三界師混元祖無能勝主四生慈父高天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦爾時玉虛上帝說是頌及十號已是諸天衆異口同音歎未會有臣謹言曰事恱於心辭溢於外故玉虛上帝之讃推尊稱頌極言苦談求有以盡玉帝之德吁帝德之大其可言盡哉臣敢以不言為稱讃庶與玉虛上帝相表裏云臣良謹言高上玉皇本行集經卷中
