  - {type: head, offset: 10, content: 天眞護持品第四, id: KR5a0011_CK-KZ-jye_003-h1, level: 1}
body:
  text: 臣謹言曰誦經功德天尊已嘗於前品言之矣今昊天上帝猶以爲未悉也復於兹時再用唘請於帝前求有以周悉之此蓋上聖慈心之切必欲導斯人以持誦之事而望上帝以優渥之恩也玉帝悲願廣大無際故於兹時宣示明敕始終備至了無纎末之遺始於東方而終於十方萬靈罔不畢舉是欲世之含生凡克於經效心則在在靈祗莫不協祐也然帝敕之重雖皆周悉而玉敕之宣首以盡忠盡孝等事爲始蓋必能忠孝恭敬不殺不盜不淫不妬不嗔不恨不驕不詐奉戒持齋冥心大道一一皆如帝言則十方萬靈然後護持如帝之敕使其未然則雖譊譊吻頰予未保十方萬靈果悉加護也雖然淨戒之具謂前忠孝等事也固玉帝責望之嚴然三界有生根品有間苟不别智愚而一以是責之則淨戒之具難乎其人也帝德慈憫仁愛洪大故於宣敕之末復出玉音曰或不依科教未能修齋具戒以能尊慕功德德慧同諸眞人吁此非玉帝之慈不以絕法待天下寍有此敕哉鈍根下士宜體帝敕先降尊重景慕之心增而上之以冀十方萬靈之祐然不可謂帝敕容以未能修齋具戒而安於怠慢焉臣良謹言爾時昊天上帝聞是說已卽於帝前乃爲歌曰大哉至道無形無名渺渺億刼黄道開淸神淸朗耀九魂吐精玉虛澄輝太霞高明玉皇開化溥度天人三元道養二象攝生朽樹故根已枯使榮蠢動蜎息長生化形懷胎含孕俱得生成亡者命過魂歸三淸魄受鍊度南宮飛昇今日大吉皆得光明五帝鑒映普告萬靈天神地祇及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大聖至眞尊神無窮無極溥監度生惡根斷絶玄都記名眾眞班列咸聽帝言經是帝敕保誦持人至度道岸無使災侵我奉帝命一切咸聽爾時昊天上帝說是歌已告大眾言此玉皇妙法語諸聖祕密言路絶道斷微妙難思巍巍大範爲神明之宗保鎮國土拔度生死爾時昊天上帝說是語時法筵淸眾咸仰道言溥得開悟于是天尊而說偈曰玉帝功德大玄理極幽深生於浩劫前運化於古今我今說妙經愍念諸有情此誠極妙法功德中功德名號最上乘無比爲第一大光明王尊威德聖希有能破暴惡魔皆令心降伏能滅極重罪皆令得淸淨若人聞是經或聞是帝名稽首生恭敬一切罪消滅十惡四重業五逆害父母信心一稱名隨聲盡消滅保護人天眾四相與五衰三途極重苦人間凡戹難凶年饑饉喪毒藥及厭魅刑獄與冤家軍陣鬬戰苦山林惡道中虎豹豺狼等江海毒龍類迅雷風雨雹水火及盜賊蠱毒所中心失志發狂亂蛇蝎毒惡蟲邪魔凶怪神伺求人便者由持是眞經普皆自散滅惡病久沈綿夢寐亦不安非理欲殘命殄滅不爲殃縁遇是經故安穩得自在所有希求願財寶及富貴以此經功德如意皆稱遂神威自在仙諸天十一曜三十二天主二十八宿王靈妃玉女等天神及地祗三界虛空神江海諸龍王水火及風神宮殿與宅舍山林樹木眾溝渠井泉神由持是經故一切皆擁護衣食常自然子孫居富貴出言人希聞所至皆恭敬若爲求男女誦持此眞經帝詔下天曹落籍天仙人降謫生其家爲其作男女顯貴人崇重七祖盡昇仙光大慶其門延及父母親吉祥常熾盛災障不能侵是故我今說大眾宜諦聽慈悲度一切皆令達上淸于是天尊普告四眾凡人持念此經受誦帝名皆道根深重宿有善縁此經尊妙普度天人但精心恭奉家國安寧保命度災掃諸不祥天子王侯得奉之者致國太平凶寇自夷邊域不爭兆民歌唱普天興隆運推數周正道當行有得之者天眞妙重祕之祕之臣謹言曰玉帝之敕其丁寍周悉已極其至也而昊天之讚天尊之偈猶至於委曲周詳如此蓋上聖高眞愛人念切以故發揚印證不憚諄復必欲俾眾生之信奉也帝敕若是而天尊天帝之言又若是則持誦之效當決如經之所載也臣良再出斯言奉勉眾生宜崇信之臣良謹言洞玄靈寶報應神驗品第五爾時慈悲度戹眞人尋聲救苦眞人濟生度死眞人萬福護身眞人俱從座起越班而出俱白天尊言若諸世末凡夫雖宿有善縁得遇是經被諸邪障之污本末疑惑不信是經功德如是之人見在過去於諸地獄得何罪報惟願聖慈說其報應惡趣之苦是時天尊謂四眞人云若諸世間剛强暴惡不善眾生終日竟夜對諸道像無恭敬心出誹謗語是罪當墮五無間獄若得值遇是持經人設諸方便誘引勸諭如是之人暫滅惡心信向是經彼人罪業淨盡無餘又若有邪見愚執惡人覩持是經生諸惡逆偏眼邪視乃至起一惡心發一惡言謗讟如是持經之人其罪過是命終之後墮大地獄永無出期何况世間眾生得遇是經不生敬仰穢手污觸葷口讀誦牀榻不淨便將安置或讀是經講習俗語共同戲笑以爲常典如是之人命過之後墮無間獄永無出期殃縁九祖受考酆都累及後世害纏子孫是人于地獄中厯無量劫受大苦惱遇無邊聖累承救拔罪惡小減又遇聖人救拔得出生餓鬼中厯千萬劫不聞漿水之名鬼報得出生畜生中畜生報出若生人中更生邊夷外道而復女身貧寒困苦癃殘百病受無量苦人所棄擲求生不得求死不得輕斯經故獲罪如是又若復有人初雖信受後復慢易善惡童子上奏三官黑簿添名靑編減算身殁之後拘閉幽牢往復三途無由解脫或於現世受種種病疥癩癰疽以爲果報憂悲苦惱日夜相煎而身或被橫惡所加或牢獄繫鎖非分自害誤食毒藥或被虎狼毒蛇之所食噉或爲冤家之所讎對或行山林值遇惡人被他屠害推落崖岸或被邪精魍魎之所殘害或值水火之所焚漂或被刀兵之所橫誅輕斯經故橫喪天年獲如是果獲如是報可不悲歟可不痛歟故報汝等依此奉行勿生邪念若諸念不生萬縁頓息塵沙惡業隨心消散一切災魔自然殄滅此之功德不可思議是誠無比最上妙法諸經之王有大利益非人勿示人能不生邪念頓息業縁是謂大利益法門也若諸天人五衰四相輪迴侵逼能捨除妄想受持是經坐招自然天福益固身度三界與道長存是此經典無與等無能勝是大威德大神咒能令一切枯槁便生枝葉花果茂盛能除眾生極重苦惱能令短命眾生而得長夀此經功德不可思議歎莫能盡若不宿植道種廣種福業乃至名字亦不得聞何况得見是經依三洞眞格八萬劫一傳此淸都至眞上聖所寶祕於玉京金闕宸宮甚爲微妙難可得遇此經宿有仙骨當爲九天眞仙之人得遇斯文承斯縁故後當齎金寶從師告盟受之方當乘機應運乃可付焉不得輕泄敬之愼之臣謹言曰臣嘗聞之經書曰諦觀法界性一切惟心造此語如宣說以爲破地獄偈是知心生則地獄生心滅則地獄滅也心之生滅地獄之有無况心不止於生而又至於起惡哉是以尊經報應品中謂凡夫造罪無量無邊苟能暫滅惡心則一切罪業遂至於盡淨無餘而起一惡心則其罪其殃有非言之可盡者是知方寸之間乃利害之機升沈之本豈容不謹之畏之哉品中下文又載一切天人或有五衰四相之起能捨除妄想則天福益固蓋想者卽心之所起也人與天相去遼邈然升沈利害一切由心吁心果可縱哉心果可晦哉倘一切眾生未能俾心之不生則亦宜勿起惡心捨除妄想使諸念不生萬縁頓息庶幾塵沙惡業隨心消散得以爲善人君子之歸則於斯經乃爲無愧所謂災魔之殄萬靈之護帝恩之及當如影隨形也又能廣而充之俾心若太虛內外貞白無所不容無所不納直詣天尊眞一不二法門高證淸淨解脫之道則一十二眞人之位玉帝三身之果有不難至也眾生宜勉之臣良謹言于是天尊重宣此義爲說偈曰設使江河水波浪能生蓮慈烏毛能白如經故難遇設使龜生毛堪採爲衣服夜月能消氷如經故難遇設使蚊蠓足堪構爲舟橋能載一切重如經故難遇設使黄口雀能銜諸大山擲之他方界如經故難遇設使一葉舟力能載崑崙浮渡於大海如經故難遇若使諸水蛭口能生巨齒其大如象牙如經故難遇設使蓬蒿葉能覆無鞅界蔭庇無鞅眾如經故難遇設使烏梟類同樹一巢棲銜食共相食如經故難遇設使兔生角堪用爲梯磴上窮有頂天如經故難遇設使鼷鼠等縁於兔角梯至天能食月如經故難遇設使驢顏唇色如蘋婆果復能作歌舞如經故難遇設使蠅蟲等能飮鐘石酒迷荒而沈醉如經故難遇爾時天尊宣說偈已溥告四眾是故持是經人名功德身一切有情被其蔭故持是經人名神通身一切吉祥咸臻集故持是經人名淸淨身是諸惡業不能侵故持是經人名威德身天魔異道不能攝故持是經人名無等身上帝遥唱萬神敬故持是經人名堅固身惡劫大難不能損故持是經人名道藏身口出語言鬼神仰故持是經人名慈悲身六道眾生賴其善故持是經人名大道身出入所在無怖畏故持是經人名良醫身善行妙法安樂人故持是經人名光明身常爲帝光所攝受故持是經人名自在身天宮妙境神能遊故持經功德說不可盡臣謹言曰天書仙格不可泛示下世故經中動以勿示非人妄傳輕泄爲戒然末世眾生昏迷不悟倘不示以徑級則善念不萌功德無積所以天尊說經雖以寶秘爲戒而玄蘊妙義輒宣剔之不惜此葢上聖之慈憫也臣奉旨校經敢援是則所以採摘妙義列造經中今經中修證果位雖未嘗準經文之二三輒爲傳之報應品中載天尊言持經之人所證諸身天府今列此爲真人之位謂如名功德身卽功德真人之位是也眾生有能勉奉是經誦持不退當直證此真人之位今四天選舉司見有陞陟是位者眾生宜堅確念慮口誦心持俾勿犯諸戒俾依如玉音求以上證此品則九族蒙恩七玄受鍊非獨此身減災得福也敬信無怠同會瑶華卑言苦祝望無疑惑臣良謹言又若道士志人能結壇誦經著新淨衣於半夜後閴寂獨處淸浄室中叩齒九通東向端坐誦詠是經於是時也太眞御几玉妃拂筵萬神班列諸天臨壇三界侍衛五帝司迎然後閉目靜思存想是經不覺身處五雲之內俄見其身光明赫奕上昇天宫眾眞下迎心有所請一切應奉仙丹妙寶隨意自取故當依科閉心奉行此經乃至三世金仙十方大聖皆從此經依按修奉故頓得超證無上妙道是茲玉帝諸天之師眾聖之王是故凡夫值遇是經致五帝輔翼召使神仙御役神官運導陰陽千靈敬仰萬神懾伏百邪避路羣魔朿形命過之後卽得南宮受鍊飛步上淸逍遥自在與道長存又設復世間眾生曾聞是經心常渴仰能於家中擇淸淨處畫帝形像日夜䖍䖍晨昏濟濟香花燈果尊重供養稱名瞻禮是人當得三十種上妙功德一者諸仙讚重二者先亡生天三者宿殃解脫四者所往通達五者無盜賊事六者所求遂心七者除水火戹八者橫事潛消九者夜夢吉祥十者疾病不臨十一者智慧聰明十二者人見歡喜十三者衣食豐盛十四者子孫榮貴十五者六親見喜十六者門族和睦十七者除三惡報十八者轉女成男十九者形容端嚴二十者爲國大臣二十一者生爲帝王二十二者鬼神欽仰二十三者得宿命通二十四者諸神護念二十五者九族受蔭二十六者處世長年二十七者有情賴善二十八者魔王保迎二十九者决超三界三十者白日上昇爾時天尊復告四眾此經功德能碎鐵圍諸山竭苦海水破大地獄拔重罪苦降暴惡魔護諸國土能滅一切惡鬼能除一切重病能解一切惡毒能滅一切惡人能伏一切毒獸能摧一切邪道一切諸天皆令降伏其餘功德說不可盡爾時道場大眾金仙菩薩眞聖眷屬聞是說已歡喜踴躍稽首敬禮而作頌曰大哉至道無宗上眞上度諸天下濟幽魂上無師祖惟道爲身丹臺紫府金闕玉京祕此妙法溥福含靈滅我萬罪增我遐齡萬神朝禮魔王保迎功德昌盛黃籙書名渺渺億劫使我長存於是眾等說是頌畢稽首歸依奉辭而退臣謹言曰尊莫尊於諸天也而大彌羅天乃天中之天貴莫貴於諸帝也而玉皇上帝乃帝中之帝故天尊言曰是此帝也諸天之師眾聖之王惟是帝處至尊至貴之位無與等無能勝是以眾生能萌尊重之心則功德無有與之並者或起輕慢之心罪報亦無有與之並者所謂三十種上妙功德特天尊舉其要畧而品中具載罪報亦天尊姑言其梗槩也眾生苟有慶幸得觀是經宜三復玩味卽良此言始終反復觀之於是經也留神儲思勉勉誦持積至三年功德無量臣旣奉校經之旨謹專具奏仰乞帝旨專署一司校錄誦持玉皇本行經之人所積功績以示神報帝德慈憫必俞所請也經末示此眾生宜知之臣良謹言附奏陳表文臣昨奉詔校正本行集經恭準宸翰令臣俟畢奏陳者臣聞𡸁世立教捨上智以奚堪刪詩定書必聖人而後可蓋典誥示斯民之繩準而詁訓爲格言之筌蹄倘一字之弗諄實萬世之取誤故述而不作者先哲所重而辭弗能措者大儒莫膺信系屬之非輕致倚任之不易恭惟玉皇本行集經祕傳金口妙藴瓊宮下仙難可獲聞濁世罕能忽見玄義邃滄溟之遠眞機崇崑嶽之高言言彰解脫之門語語鼓淸淨之吹嘆之莫盡卽以奚窮偶厯時之過多忽傳本之致誤㸃霧固何傷於日月小疵庸曷損於瓊瑤豈期聖慮之過慈猶欲寶文之全善誕頒温詔寵命愚臣俾攄狂斐之才直膺諟證之職綸音震響耳然蠢聽之琳琅宸翰揮揚豁爾塵襟之開廓臣遜辭惟切委畀寖隆顧猥賤之非材第忪慄而抱愧重付眷懷之難咈用驅駑質而敬承喜懼交馳謙伏靡暇敬竭爝火之見仰助陽暉之明於卷首則摘品而分章至次編則總意而明義證譌謬者三十有八更乖誤者四十有三雖始終品秩猶未殫參校之全而前後句音尚不罄𢯱抉之備第爲人世流傳之久恐重民間疑惑之多姑令大體之弗疎故卽小節而致簡至如指摘譌舛不敢如布縷之詳抉剔幽玄未獲若開條之悉蓋慮多多爲語乙乙必書繁則取厭於玩閱之勞演則賈疑於參味之審其他更革悉未周完謹繕錄以進呈乞矜容而閱視倘有纎毫之裨補願干明詔之頒行或乞申命有司再詳要義庶免三傳散春秋之誚及無九師微易道之譏臣良刳抉肺肝玷塵聰眷併匃哀原冒昧之責俾得服勤職守之卑誓竭金石之誠上荷海嶽之惠臣良下情無任瞻天望聖悚慄戰懼俯伏待罪之至謹具表奏聞伏候敕旨恭準批答云詳奏及閱所上校正經文訖卿仁念粹和文華煥燦精效參詳之思審加訂證之勤豈徒謬語之復眞抑且妙義之抉奥矧襟懷之温厚故文字之淸醕灼識情誠重勞精思宜下玉宸內殿收貯及頒詔諸天從此誦持並可命南洲及諸洲演化眾眞照此傳行毋得䙝慢外賜爾九光寶節八景珍輿以旌勞績切宜祗受副此眷懷故兹批答想宜知悉誦經感應經中感驗自上古隋唐以來古今事實舊嘗備載藏本續畧摘數事附于卷後以證此經功德不可思議陳王暴隋時會稽人擢第入金門集釋褐任長城尉自少誦此經每至戹難多獲助至開元中自會稽江行之東陽大雨與二十餘船同發乘風掛帆須臾天色昏黑風勢益壯至界石竇上水擁波擊前二十餘船皆壞王暴急念此經流中忽有一物狀如赤龍橫出扶舟因得達岸俱得活誦經之力銀山老人饒州人所居採銀戸逾萬俱是草屋延和中天火發屋皆燼此居火不及時州牧問老人有何術法答云奉道年深日誦此經不闕慕容文遠隋人病亡七日欲殮忽縮一足遂蘇云被一人追入一城見王者問卿在生有何功德文遠答貧家無力可修功德惟一心念玉皇經王稱善曰此經欲得聞乎遂延文遠上殿設一金牀令誦經忽有玉女頭翠鳳冠服紫霞衣手指文遠陽間所誦經本跪言其前令分明讀誦畢忽不見出門唯有追吏隨行登一高山見城郭極高峻煙火接天黑氣溢地哀呌之聲不忍聞叩頭求去使者乃引回家見形卧牀鬼吏自後推之冥然復活竇德玄麟德中爲奉使過揚州渡淮船見一人形慘悴引一小童坐地上德玄曰天晚别無船來何不同行遂至中流見本人有飢色與食濟之達岸德玄上馬同行十里間問君欲何往答曰我非人乃東嶽鬼使往揚州追大使竇德玄德玄驚怖下馬拜曰我卽是德玄涕泗請計鬼甚愧云公容載設食濟急奈何汝急誦玉皇經一百部當來相報玄德曰世無本鬼使曰鉢洲靈仙觀道士尹嗣玄有正本可急索誦言訖不見德玄遂回令人求經本晝夜不斷續誦經一百部因晝卧夢見前鬼使來喚至一城殿門外使曰且立此當白王使旣入德玄於外遙聞王怒云爾何故漏泄吾事爲他作計令左右驅決其使使出袒以示曰此乃爲公致此引入見王問曰公有大功德算未盡人間秩滿當生天界召使送回德玄問使者云我將來官爵如何答汝從此可改殿中監六十四至左相言訖辭去覺後果如所言司馬喬卿唐時河內人永徽間爲揚州戸曹丁母憂結廬寫經廬側生芝草綠莖朱蓋日滴汁一升食之味甘經畢母於座中語云得汝追悼之力今可生天李脩唐顯慶中丁父憂發心寫此經三部答劬勞纔一部了筆間有五色圓光之炁經畢筆無所損每聞異香座前時有花墜後失筆頭經半載夜因見地上有金色光彩示之乃向所失筆頭自然光彩不壞經之功德孝誠所感父得超㫒吕文展唐開元三年任閬州信道誦此經萬卷年衰牙落向經懇請牙復生如舊時亢旱刺史令祈雨誦經一徧隨獲霈然又苦霖潦别駕復令祈晴立霽又一夜誦此經見屋內光明若晝有王者數人與諸仙眾長跪合掌禮拜稱善文展大驚下座回禮云文展無道法得聖賢如此恭敬罪當萬死王者云我等皆天人魔王適向諸天見此人間有光照燭故尋光化身下降云珍重而去出金匱靈文
