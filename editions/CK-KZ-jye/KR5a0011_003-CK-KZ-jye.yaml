front:
  text: 高上玉皇本行集經卷下爾時昊天上帝聞說經法從座而起長跪帝前白言上帝願爲大眾及諸人天持是經人說利益事爾時玉皇尊帝興方便意開利益門宣玉匱科傳靈寶法告於昊天上帝言汝今諦聽當爲汝說受持功德扶危拔苦利益存亡神妙之事眾眞稽首俱發聲言弟子臣等今日幸聞湛然常住之法莫不上福三界諸天下消三塗毒害惟願慈悲愍臣等故演斯妙義玉帝告曰若有眾生孝養父母恭敬三寶竭忠於君不殺不盜不淫不妬不嗔不恨不驕不詐奉戒持齋冥心大道生尊重心誦持是經我卽敕下周流沙界徧傳十方無極世界敕命東方東華帝君靑騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命東南扶桑大帝與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命南方朱陵大帝赤騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命西南太華元老與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命西方皓靈黃老白騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命西北皇天上帝與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命北方紫微帝君黑騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命東北沖虛天君與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命中央天皇大帝崑崙蒼老黃騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命上方來和天君名山大洞神仙兵馬無鞅數眾悉令下降覆護受持是此經者敕命下方一切金仙四眾八部及諸眷屬悉令下降覆護受持是此經者敕命十方飛天神王飛天大神三官四聖二曜九星北斗南斗東斗西斗中斗二十八宿周天眾星金剛力士神王等眾各與部眾悉令下降覆護受持是此經者敕命降魔力士四天門王五嶽四瀆及餘諸山四海九江十二河源山林川澤一切主者令與眷屬覆護受持是此經者諸險惡處令得安穩敕命所在一切土地靈官并溝渠等一切諸大力鬼王皆令覆護受持是此經者令眾魔外道悉皆懾伏濳形遁迹高飛海外遠避他方如是山林社稷祠廟血食之屬一切鬼神當自消滅五方行病瘟疫鬼帥諸惡鬼神并風王水怪孽龍妖神土精木魅盡自消滅五虛六耗夢寐乖常野道咒詛蠱毒之類皆自消滅心欲願者一切如意皆得滿足是持經人或不依科教未能修齋未具淨戒以能信受尊重景慕是此經典並同修齋護淨戒者是人功德坦然無礙自在逍遙號人中聖德慧長新同諸眞人
