front:
  text: 重刋道藏輯要高上玉皇本行集經
  hash: sha256:784e911e447c9f302b421c1d134f9a0bf0ebbdc66d324ee46c764d81cb9c32a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0011_CK-KZ_01p001a, image: JY088/CK-KZ_JY088_01p001a.png}
body:
  text: 天樞上相臣張良校正三淸勅門下湛寂常道信擬議之至難恢漠神通豈形容之可盡凡寓讚揚之語庸昭誘導之門諒一時聞聽之差殊致諸仙流傳之舛異矧經世厯年之甚久故誦言作字之弗眞曷嫌魚魯之成曾奚怪烏焉之爲馬不有諟證寍免乖訛肆申命於文臣俾稽詳於聖典天樞上相張良宿專儒業今領樞司旣命壇演化於南洲已出書度人於下界宜職討論之任倍隆參校之功副人世之誦持示天書之藴奥悉令誤戾咸至完全於戲道本心傳妙悟實由於言外義因言顯進修當自於經中可倍加審訂之思使無愧編修之寄并述參求之路誕彰造入之階庶眞徒卽此以求玄俾善士由茲而得道反其澆薄還此淸湻俟畢奏陳當憑頒下故茲詔諭切可遵承臣良上言昨恭準睿旨委臣良參詳審訂玉皇尊經者臣良恭聞道妙難言豈在言語敷宣之悉經昭垂教要先教彰演述之詳是理孔明在人皆喻第念格言之當理無得而踰矧夫凡世之素承久則難變儻妄有一言之更革則不免萬姓之持疑宜不易於舊章庶弗生於他議且恨庸才之孱暗難於聖典以參詳敢干鼎鑊之誅上布肝腸之懇臣良誠惶誠恐稽首頓首重念臣良塵區微類濁世賤臣幸憑師匠之陶鎔獲遂仙曹之升擢謬以疎愚之質輒司樞要之權夙夜以思情誠交懼惟欲勉效於駑鈍求以苟逃於罪辜豈意睿慈特頒明詔綸言温穆燠如春日之和玄旨雍容豈類秋霜之凛挈校經之重任俾效拙於祕詮顧此昏庸孰堪任使況聖語曲盡於至理而眞經久漬於凡心時若卒更民焉盡信深懼無知之愚俗反萌不信之凡心或侮祕文將貽巨譴非但賤質有失職之誚弗免寶文爲覆瓿之羞論至於斯事有可議臣愚欲望天光燭暗睿鑒知濳體察下誠特蠲重任或乞更命英哲掄擇巨能畀之討論庶無擬議臣良祗膺玉旨敢布狂言實非上拂於眷隆率以悉傾於意願罪當萬死恩望三淸切匃斷自宸衷播告中外誓當勉揚臣職仰答寵光臣良干冐天威下情無任悚慄戰懼之至稽首頓首謹具表奏聞伏候敕旨謹奏三淸再詔所奏備悉卿學貫百家道班列聖已領度人之職久專出書之權眷彼南洲之民素佩名理之誨顧本行集經適有於舛雜視下方黎庶各抱於迷疑肆議選掄特俾詳校宜祗膺於前詔再恭奉於兹言毋忽謙辭仰副責任故再詔諭切可欽承臣良上言琅函積阜無非妙義之存寶蘊儲沙莫匪玄機之寓皆上聖憂人之切故祕言垂世之多雖千編萬軸不勝其繁然隻字片言卽藴厥要苟解提綱而振領自然掘土而得金如或見昧粗精識迷徼妙不啻隔紗而視日奚殊認鹿以爲牛直饒辛苦百年勤勞一世竟未達穹玄之要妙豈能知混浩之機關要須心外攝心眼中著眼咀味至眞之實忖惟太妙之根用能勘破玄中之玄卓領寂中之寂是謂嚼得龍肝鳳髓脫兹俗質凡軀自然昇入無形頓超有漏神飛金闕優游彌羅之天體合玉京左右穹蒼之主恭惟玉皇本行經者至眞眞體上聖聖機寓眞一之妙於紀述之餘示解脫之門於讚揚之際辭意互攝理事交參言中包蓄於眞玄更無隱奥語內鋪舒於微妙蔑有緘藏味之者神洽太和誦之者心離諸漏神功妙用廣博難量沖義靈機包羅無外第以眾生障重凡類識迷言上求言不貫爲言之脈絡字間究字不參訂字之根苗徒求本行之始終豈悟至言之紀極遂至謾貪果報祗求立效之爲神獨畏憲章昧謂鮮殃之得徴聖典固彰於異迹玄言本寓於眞機曷容卽粗以捨精宜勿著麤而離妙然後脗合天尊之本旨默符玉帝之宸衷進趣修行頓遠濁惡之世昇騰超證高陪淸淨之儔斯可造淸微天登光明殿不勞玉帝妙音之再出獲詣天尊法門而泛游具六神通得大自在斯乃始名於信受斯乃眞號於誦持苟或萬徧譊譊不究眞一之旨六根泛泛不投解脫之機是皆未可以仰酬天尊說經之勞未可以仰獲玉帝護經之績更諮敬信之士倍加持奉之功口誦心存如處玉光之內神交意晤如遊寶苑之中諦觀分身合身之神通靜想應化應物之妙用湛然無累卓爾有憑卽乃平步天宮列名聖籍臣良仰膺睿詔將讚寶經敬先敷露於鄙言于以宣告於當世至如護持功德之說報應神驗之詳已具成經不勞贅語若夫鋪張至理訂證誤文雖非謬才之可能幸以温詔之所畀已嘗遜避弗許謙辭卽當刳剔此心審正于下先作斯語肇闢于經庶畀來觀之人首認紀述之意臣良稽首頓首拜手謹書
