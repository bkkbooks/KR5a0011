front:
  text: 高上玉皇本行集經卷中盈五
  hash: sha256:14111c0745cac06d02a41203528b6e1035b17edaf8e55e517911c3b56793234d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0011_SJB_002-010721a, image: sjb/01/010721a.png}
body:
  text: 天樞上相臣張良校正太上大光眀圓滿大神呪品第二爾時天地始祖五老上帝稽首長跪白天尊言伏聞高上玉皇一本云天尊高上玉皇竊見放光事専屬玉皇今略天尊二字慈念蒼生普放神光照燭法界六凡四聖普叨道蔭竊以凡夫短景劫運將终正道宜行以濟兆民使修眞之子有期輕舉末代烝民倶獲夀考自昔元始洞玄靈寳赤書玉篇眞文生於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗無氣無象無色無名無形無緒無音無聲混沌太無靈文晻曖乍存乍亡二儀待之以分太陽待之以眀靈圖革運玄象推遷乘機應運於是存焉玉帝授臣靈寳祕篆大不可思議神呪故天地得之而分判三景得之而發光靈文鬰秀洞映上清發乎始青之天而色無定方支勢曲折不可尋詳元始鍊之於洞陽之館冶之於流火之庭鮮其正文瑩發光芒洞陽炁赤故號赤書靈圖旣煥萬帝朝眞飛空歩虚旋行上宮焼香散花口詠靈章是時天降十二玄瑞地發二十四應上慶九天之靈奥讃三天之寳眀神風旣鼓皇道咸暢元始登命太眞按筆玉妃拂筵鑄金爲簡刻書玉篇五老掌籙祕於九天靈都之館玉女典香太華執巾玉童侍衞玉陛朝軒九天上書非鬼神所聞故天寳之以致浮地祕之以致安五帝掌之以得鎭三光乘之以高明上聖奉之以致神高尊掌之以致眞五嶽從之以得靈天子得之以致治國祚享之以太平實靈文之妙德乃天地之玄根威靈恢廓普加無窮蕩蕩大化爲神明之宗其量莫測巍巍乎太空明眞有格今當以行是時元始革運玄象開圖靈文鬰秀神表五方分判天地開化萬靈此大宗之業可得暫披於靈韞乎今皇道敷暢澤被十方仰觀劫運眞風宜行臣私心實欲使靈蔭八遐風灑蘭林寒條仰希華陽之繁朽骸蒙受靈奥之津仰對元慈下伸丹懇惟願哀憫撫念蒼生不審靈寳玉篇眞文可得見授下教於未聞者乎於是元始天尊撫几高抗凝眞遐想觀時已至普謂時會一切眞聖論定隂陽推數劫㑹移校河源檢錄天度選擇種人指拈太無嘯朗九玄永無開聽於陳辭有若閉礙求眞之路是時五老上帝啓問不已良久元始天尊乃垂盻眥之容慨爾歎曰惟乎深哉子今所扣豈不逺乎此元始靈寳之玄根空洞自然之眞文生天立地開化神明施鎭五嶽安國康良靈寳玄妙爲萬物之尊天發玄瑞靈應自然今三天盭運六天道行雜法開化當有三萬六千種道以擇來者之心此法運訖三龍之後庚子之年雜氣普消諸天慶㑹吾眞道乃行今且可相付當錄於上館未得行於下世玄科有禁不得便傅子可詣靈都紫微上宮視天音於金格取俯仰於神王然後當使得備天文以總御元始之天也於是五老上帝與諸眞聖清香執戒徘徊雲路嘯命十天上詣上清太玄玉都寒靈丹殿紫微上宮受俯仰之格乃知天眞貴重難可即聞還乃更詣元始天尊語以禁戒之儀遜謝不逮是時天尊慈顔愍喻靈關廓開登命五老上帝開洞陽玉館披九光八色之韞雲錦之囊出元始靈寳赤書玉篇眞文金書玉篆微妙祕宻運御乾坤大光眀圓滿大神呪玉章以付五老上帝及諸眞聖使依玄科按法以傳臣謹言曰臣竊見五太未兆之初二氣未始判也萬類未始形也恭惟元始上帝凝道炁於混茫列眞書於杳漠神風交扇二氣乃分二氣旣分萬類乃兆然後降已凝之道炁錫已列之眞書寓爲河洛之文以立人道以治三才已凝之道炁已列之眞書即今世間所謂眞文靈符者是也然眞文之大者以之判天地以之運隂陽山河之流峙人物之生成皆眞文之所爲也是乃造化之機緘天地之神用兹未始傅於下世也惟度人弭災制魔之篆今見於世焉即神呪品中諸品呪文是也但經之行世傳於上眞受於下仙傳之者非一眞受之者非一人故語言之詳略意義之精粗間有可得而議者焉如神呪品啓關之文或詳或略或言有未倫或意有弗貫世之誦者毎毎致疑臣仰奉玉音繆職參校欲行裁益深自憂虞蓋恐裁益之文旣行而世間念誦之疑轉熾輒從舊本略證乖譌其他意義之失貫辭語之未倫俱不敢議惟世間之經其略者恐包括之未盡其詳者頗終始之周宻敢潔詳者一本爲正俾人世即此而誦持焉臣良謹言是時東方安寳華林青靈始老蒼帝所受神呪誥命東方九炁始皇青天碧霞鬱壘中有老人總校圖籙攝炁舉仙右篆是前二十四字青帝祕文書于九天元臺主召九天上帝校神仙圖籙歳星輔肝角亢鎭眞氏房心尾四景迴旋箕主七辰正斗明輪承炁捕非掃除災羣右篆是前三十二字祕文書于紫微宮東華殿主召星官正天分度東山神呪攝名九天赤書符命制會酆山束魔送鬼所誅無蠲悉詣木宮敢有稽延右篆是前三十二字祕文書于東華玄靈之館主攝鬼魔正九天炁下制東河溟海水神大劫洪災蛟龍負身水府開道通徑百千上帝赤文風火無間右篆是前三十二字祕文書于九天東北玉闕丹臺主攝東海水帝大劫洪災召蛟龍及水神事欲免水災用黄書此字於青紙上別呪投水中解難也右東方九炁靈寳玉篇眞文合一百二十字皆太上無上大光明圓滿大神呪空洞自然之書一名生神寳眞洞玄章一名東山神呪一名青帝八威策文東方青帝符靈寳九炁天文化生赤帝炁三天九眞太空尊神右少陽之炁化生太陽三炁丹天主小劫巳大劫午運周赤帝行佩此文得度其災符文如前當依此以朱筆書于青繪九寸上東方安寳華林青靈始老蒼帝符命日月以定山林以開三天大慶羣眞徘徊右元陽之炁生九炁青天寳東方青帝治九九八十一周則九天之炁交爲大劫更始佩此文則與運推移得度洪災當以青筆書文白繪上元始青帝眞符召直符區更生守靈寳天文道士吞之靈炁鎮肝生青精寳華九葉神爲役使通靈致神仙直符區更生無上大眞右上始天光文岀青帝眞文篇以安東方九炁之天青帝受此文以鎭東嶽封一通藏九靈洞室四萬劫一開修眞之子命屬東嶽青書絳繪佩身并本命日朱書向東服之九枚直符吏區更生隨符入腹肝臓之中九年皆生青精寳華九重光映于形外又當青書絳繪内神杖次黑帝上節中青衣玉女九人持衞勿致不精當有考吏修眞之子佩服前符篆東向叩齒九通想青炁入肝中生九重華光徹映項後書符置前乃呪曰无上青精九炁大靈神光遐散流映東青華景鬰勃灌我身形宮府安鎮寳魂自生洞逹八朗飛昇玉庭前訣說别呪者此呪是也東方安寳華林青靈始老蒼帝三元符命九駕命天龍符保眞多川災水不敢彌天右九炁青天下元小陽九已小百六午其年大災除民靈寳青帝岀下元符命下東嶽保存萬物安國康民制九炁青天分度以度學者之身青書白繪中山神呪易爲神臣度人命籍萬災不纏右中元太陽九申大百六酉其年禾稼俱衰青帝出中元符下東嶽蔭育萬物制天分度以度種人大災青書白繪西山上王命爲保眞一人有道位事九眞右上元大劫交周天地改易金玉山海人良鳥獸一時滅盡天地溟涬無復光眀青帝出上元符下東嶽保存萬物制九天炁以度學者其三元符命保固青天元始之炁佩之皆得始分之中其此文九千年一出東嶽青帝云大劫交周當刻書金札以佩身青書白繪右玉皇誥命以錫東方安寳華林青靈始老蒼帝九炁天君令統御東方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊眞仙聖衆一切威靈符命所臨如誥奉行南方梵寳昌陽丹靈眞老赤帝所受神呪誥命南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三炁勃光神仙受命應㑹太陽右篆是前三十二字赤帝祕文書于九天洞陽之館主召九天神仙圖籙金名熒惑輔心井鬼守房柳星張翼亢御四鄕軫總七宿迴轉天常召運促㑹正道驛行右篆是前三十二字祕文書于三炁丹臺主召星官明度數正天分赤文命靈北攝酆山束送魔宗斬滅邪根符教所討明列罪原南山神呪威伏八方羣妖滅爽萬弑摧亡右箓是前四十字祕文書于西南陽正玉闕主制北酆正鬼炁南海水帝太伯龍王神呪流行普掃不祥洪水飛災止蛟召龍開除水徑千道萬通敢有干弑攝送火宮赤書所吿莫有不從右篆是前四十八字祕文書于西南陽正西闕主攝南海水帝大運交期洪水四出召蛟龍及水神事右南方三炁靈寳玉篇眞文合一百五十二字皆太上無上大光明圓滿大神呪空洞自然之書一名南雲通天寳靈矜一名九天無上之上呪一名赤帝八威策文南方赤帝符靈實三炁天文化生黃帝炁王事司斗正屯尸身右太陽之炁化生中央一炁黄天主小劫丑未大劫辰戌九天炁交黄帝行佩此文防陽九之災符如前文當以黄筆書于絳繪三寸之上南方梵寳昌陽丹靈眞老赤帝符命玉音吐炁素奏以御保命定仙玉曆定封右洞陽之炁生三炁丹天寳南方赤帝治九九運周陽炁激大劫终佩此文度災橫見太平以丹筆書之元始赤帝眞符召直符昌中守靈寳天文道士吞之靈炁鎭心生丹精寳華三葉神爲役使通靈致神仙直符昌中止道統御右上陽明文岀赤帝眞文篇以安南方三炁之天赤帝受此文以鎭南嶽封一通南霍山阿四萬劫一開道士命屬南嶽赤書黄繪佩身并本命日朱書向南服之三枚直符祝昌中隨符入腹心府之中三年皆生赤精寳華三重光映于形外又當赤書黄繪内神杖次青帝下節中太丹玉女三人侍衞勿致不精當有考吏修眞之子佩服前符篆南向叩齒三通想赤炁入心中生三重華光徹映胷後書符置前呪曰丹華流映寳芝生光神精徹幽散靈八方直符攝炁嘯命朱童三精敷煥注我絳宮赤神安鎭五香溢充洞映形外表裏發光身生水火獨歩飛行前訣說别呪者此呪是也南方梵寳昌陽丹靈眞老赤帝三元符命正一命人長生上天右三炁丹天下元小陽九辰戌小百六丑未其年土中生火萬物自死靈寳赤帝岀下元符下南嶽保存萬物安國康民制三炁丹天分度以度學者之身赤書黑繪萬川洪流符吏水毋竭焉右中元大陽九亥大百六子其年火滅水出赤帝出中元符下南嶽度兆民災制天分度消滅水火之戹赤書黑繪日月力出王平山東火災不起人民臣右上元大劫交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光眀赤帝出上元符下南嶽保度萬物制九天炁以度學者其三元符命保固丹天元始之炁佩之皆得始分之中其此文九千年一出南嶽赤帝云大劫交周當刻書金札以佩身赤書黑繪右玉皇誥命以錫南方梵寳昌陽丹靈眞老赤帝三炁天君令統御南方諸天諸地日月星宿名山靈洞水府泉宫上聖高尊眞仙聖衆一切威靈符命所臨如誥奉行中央玉寳元靈元老黄帝所受神呪誥命中央總靈黃上天元始生五老中皇高尊攝炁監眞總領羣仙典録玄圖宿簡玉文催運上炁普吿萬神右篆是前四十字黄帝祕文書于太玄玉寳玄臺主召神仙玉簡宿名總歸仙器鎭星輔脾迴度北元魁𩲃主非截邪斬姦𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛傳右篆是前四十字祕文書于玄都玉臺主攝星官正天度數敕攝北帝遏塞鬼門翦除不祥莫有當前右篆是前十六字祕文書于玄都玉臺主攝北帝正天炁檢鬼精中山神呪召龍上雲制㑹黄河九水河源不得怠縱善惡悉分千妖萬姦上對帝君莫有干試太陽激燌赤書玉字宣告普聞右篆是前四十八字祕文書于玄都玉臺四壁以攝中海水帝四泉之水洪災涌溢之數主召水神止蛟龍事右中央一炁靈寳玉篇眞文合一百四十四字皆太上無上大光明圓滿大神呪空洞自然之書一名寳劫洞清九天靈書一名黄天大神呪一名黄帝八威策文中央黄帝符靈寳一炁天文化生白帝炁山陽之日正斗屯乙有物兮申爲上仙元右元一之炁化生少隂之炁素天主小劫申大劫酉大運交會洪災掃天白帝行佩此文得過大陽九符如前式當以白筆書文于黄繪三寸上中央高皇玉寳元靈元老黃帝符命總召天地九天以制同係王炁上帝遥觀右元高皇之炁生元一炁黃天寳中央黄帝治九九運終陽炁激隂炁勃大災涌水彌天掃穢佩此符得度天災見太平君黄筆書之元始黄帝眞符召四方直符守靈寳天文保中央道士吞之靈炁鎭脾生黄精寳華十二葉神爲役使通靈致神仙直符中非三天靈文右總靈文岀黄帝眞文篇以安中央之天黄帝受此文以鎭中嶽封一通嵩山靈洞之中四萬劫一開道士命屬中嶽黃書白繪佩身并本命日朱書向王方服之十二杖直符司中非隨符入膓脾府之中十二年皆生黄精寳華十二重光映于形外又當黄書白繪内神杖次赤帝下節中黃素玉女十二人侍衞勿致不精當有考吏修眞之子佩服前符篆向王方叩齒十二通思黄炁入脾之中生十二重華光映一身後書符置前呪曰總元高靈回神四鄕黄上散華五帝交芳流精散漫十二重光混合我形萬神相迎安鎭黃脾養氣中方保齡度劫永鎭無窮前訣説別呪者此是也中央高皇玉寳元靈元老黃帝三元符命天徊月移劫運無衰右一炁黄天下元小陽九申小百六酉其年霧障迷天不分晝夜靈寳黃帝出下元符下中嶽保存萬物安國康民制一炁黄天分度保度學者之身黃書青繒丁𧥺有命勿句存玃爲無育見乾坤右中元大陽九寅大百六申其年山川俱壞黄帝岀中元符下中嶽度種民制天分度固地炁禳災戹黃書青繒出陽入隂壞山川九土欲崩符不聽頽右上元大劫交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光明黄帝出上元符下中嶽保度萬物制九天炁以度學者其三元符命保固中央黄天元始之炁佩之皆得始分之中其此文九千年一岀中嶽黄帝云大劫交周當刻書金札以佩身黄書青繪右玉皇誥命以錫中央寳劫洞清玉寳元靈元老黄帝一炁天君令統御中央皇天后土日月星宿名山靈洞水府泉宮上聖高尊眞仙聖衆一切威靈符命所臨如誥奉行西方七寳金門皓靈皇老白帝所受神呪誥命西方素天白帝七門金靈皓映太華流氛白石峩峩七氣氤氲上有始生皇老大神總領肺氣主校九天檢定圖籙制召上仙右篆是前四十八字白帝祕文書于九天素靈宮北軒之上主召仙氣舉仙道也太白檢肺奎婁守魂胃昴畢觜主制七關參總斗魁受符北元右篆是前二十四字祕文書于金闕玄窻主攝由帝星官正明天度赤書玉字九天正文攝召萬炁普歸帝君右篆是前十六字祕文書于九天金闕三圖之館以攝六天鬼炁西山神呪八威七傳符水上龍召山送雲在所校錄同到帝門輔衞上眞斬滅邪源若有不祥截以金關赤書符命風火驛傳右篆是前四十八字祕文書于九天金闕三圖之館主攝西海水帝制水中萬怪惡毒之精召雲龍以防水旱之災也右西方七炁靈寳玉篇眞文合一百三十六字皆太上無上大光明圓滿大神呪空洞自然之書一名金眞寳明洞微篇一名西山神呪一名白帝八威召龍文西方白帝符靈寳七炁天文化生黑帝炁上止五道乙勿人迴遊兆子三天門右少隂之炁化生太隂五炁玄天主小劫中太劫酉陽炁極百六乗九黑帝行佩此文度甲申大水洪災符如前式當以黑筆書于白繪七寸上佩身西方七寳金門皓靈皇老帝君符命策駕五老西盻九都億劫同會明定九河右元隂之炁生七炁素天寳西方白帝治九九數隂炁涌陽炁否九天炁交爲太陽九之災佩此文其時則晏鴻毛而高翔觀洪波於天際當白筆書其文元始白帝眞符召直符吏曲正守靈寳天文道士吞之靈炁鎮肺生白精寳華七葉神爲役使通靈致神仙直符曲正洪災度人右光天靈文出白帝眞文篇以安西方七炁之天白帝受此文以鎮西嶽封一通於金穴九掖洞中四萬劫一開道士命屬西嶽白書黑繪佩身本命日朱書向西服之七枚直符吏辱曲正隨符入腹肺府之中七年皆生白精寳華七重光映于形外又當白書黑繪内神杖次黄帝下節中太素玉女七人侍衛勿𦤺不精當有考吏修眞之子佩服前符篆向西叩齒七通想白炁入肺之中生七重華光映丹田後書符置前而呪曰金靈七炁素帶流分金精童子首建元巾帶符攝炁萬神㑹門寳光奕奕照我命根安鎭肺華萬劫長存前訣說別呪者此是也西方七寳金門皓靈皇老帝君三元符命西山注鬼煥乎九天醜力難逼斬以金關右七炁素天下元小陽九亥小百六子其年人民萬物被水漂蕩靈寳白帝岀下元符下西嶽保存萬物安國康民制七炁素天分度以度學者之身白書赤繪日爲正王陽生三斬殺萬魔雲龍間右中元大陽九巳大百六午其年兵革四興白帝出中元符下西嶽度兆民制天分度除滅兵戈之戹白書赤繪上盈事已人身三道在一一保人身右上元大劫交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光明白帝出上元符下西嶽保存種民制九天炁以度學者其三元符命保固西方素天元始之炁佩之皆得始分之中其文九千年一出西嶽白帝云大劫交周當刻書金札以佩身右玉皇誥命以錫西方七寳金門皓靈皇老白帝七炁天君令統御西方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊眞仙聖衆一切威靈符命所臨如誥奉行北方洞隂朔單鬰絶五靈玄老黑帝所授神呪誥命北方玄天五炁徘徊中有黑帝雙皇太微總領符命仙鍊八威青裙羽䙱龍文鳯衣上帝所舉制到玉階右篆是前四十字黑帝秘文書于鬰單無量玄元紫微臺北軒之内主召諸眞人神仙圖籙北辰輔腎斗牛衛非女虚危室豁落四開璧總七星執凶紏非却災掃穢明道輪輝右篆是前三十二字祕文書于天心北元玄斗中主攝北方星官正天炁也北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅摧右篆是前二十四字祕文書于北方洞隂朔單鬰絶元臺主攝天魔北帝制伏惡仲萬鬼事九河傾訖鳥毋羣飛蛟龍通道水陌洞開赤文玉書驛龍風馳右篆是前二十四字祕文書于洞隂朔單鬱絶元臺以攝北海水帝制水中萬精主召蛟龍興雲致雨以負身一本云興雲致雨事右北方五炁靈寳玉篇眞文合一百二十字皆太上無上大光明圓滿大神呪空洞自然之書一名本命紫微元神生眞寳明文一名北山神呪一名黑帝八威制天文北方黑帝符靈寳五炁天文化生青帝炁三炁高王易遷川人司萬言右太隂之炁化生少陽九炁青天主小劫亥大劫子隂炁勃天地周青帝行佩此文度洪流大水之災符文如前當以青筆書于黑繪五寸上以佩身北方洞隂朔單鬰絶五靈玄老帝君符命北斗定命九期景散八極明石玄滋右洞隂之炁生五炁玄天寳北方黑帝治九九交運隂炁勃陽炁激九天炁交天地大災佩此文則免洪流萬厲之中以朱書文元始黑帝眞符召直符尹豐守靈寳天文道士吞之靈炁鎮腎生玄精寳華五葉神爲役使通靈致神仙直符尹豐開道赦鬼右通明文岀黑帝眞文篇以安北方五炁之天黑帝受此文以鎭北嶽封一通於玄隂洞室四萬劫一開道士命屬北嶽黑書青繪佩身本命日朱書向南服之五枚直符吏尹豐隨符入腹腎府之中五年皆生黑精寳華五重光映于形外又當黑書青繪内神杖次白帝下節中太玄玉女五人侍衛勿致不精當有考吏修眞之子佩服前符篆向北叩齒五通想黑炁入腎府之中生五重華光輝映背後書符而呪曰北上太玄五炁徘徊寳華五重流光煥暉雲景鬰香洞映太微仰注我身腎府鮮開安鎭靈宅萬神總歸身生羽服舉形自飛前訣說别呪者此呪是也北方洞隂朔單鬰絶五靈玄老黑帝三元符命上王適月命天仙戌巳多力士辟水源右五炁玄天下元小陽九寅小百六卯其年洪水運天人民流散靈寳黑帝出下元符下北嶽保存萬物安國康民制五炁玄天分度以度學者身黑書黄繪三命正戊入力人任曰遣患無爲君右中元大陽九辰戌大百六丑未其年天地枯旱海底揚塵人民焦死萬無遺一黑帝出中元符下北嶽度兆民制天分度除滅早荒之戹黑書黃繪適百百九君有臣三千此度己身右上元大刼交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光明黑帝岀上元符下比嶽保存種民制九天炁以度學者其三元符命保固北方玄天元始之炁佩之皆得始分之中其文九千年一出北嶽黑帝云大劫交周當刻書金札以佩身黑書黄繪右玉皇誥命以錫北方洞隂朔單鬰絶五靈玄老黑帝五炁天君令統御北方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊眞仙聖衆一切威靈符命所臨知誥奉行臣謹言曰五老上帝分理五天下地萬生俱屬統治妙道生成之任莫此爲專故玉帝初劫畀以度人弭災制魔玉篇眞文畀之以接度學仙之人畀之禳救星辰之災又昇之息洪流制魔害無非所以厚生成之澤使萬類各得其所也五老旣奉之以守其職矣猶恐帝恩之未博生靈之未遂故於玉帝放光之後繼用啓陳挈所受之眞文以授下世吁帝心之慈如此其至也而五老能廣而充之豈非上聖之心均於仁愛也歟前五篇眞文道書備載書篆之式施行之訣悉詳見於諸經今茲載於本行經者特正文也蓋本行經専主於誦念故正文不可無而雲篆庸可略至若一切諸符九炁諸炁眞文三元諸符今並略之刋於經末修行者各當即行之但眞篆正文之誦尤當嚴謹蓋此文乃上帝誥命也誥命之宣萬靈聞之莫不稽首儻輕慢苟簡視爲常文出入吻唇姑爲談戲則懲青之酷當如報應品中之載誦經者宜欽奉之臣良謹言道言是大神呪者元始之妙言玉皇之眞誥上清自然之靈書九天始生之玄札空洞之靈章上聖之祕語玉晨之尊典成天立地開張萬眞安神鎭靈生成兆民匡御運度保天長存上制天機中檢五靈下策地祗嘯命河源運役隂陽召神使仙此至眞之妙文神應自然致天高澄令地固安保鎭五嶽萬品存焉玉帝昔授五老上帝是時五帝跪捧其章祕題靈都之館天眞皇人昔書其文掌之於上清眞境太玄玉都寒靈丹殿紫微上宮累經劫運而其文保固天根無有毀淪與運推遷是大神呪混之不濁穢之愈清毀之不滅滅之極明大有之文天眞所尊自無眞名帝圖刻簡來生斯文隱祕不得窺聞有得之子保萬氣長存勤行修奉刻致神仙臣謹言曰五篇玉書眞文神功妙用莫可測量蓋得度人錄仙眞文而施行之則九天衆眞紀名仙籍降炁接度得制星眞文而施行之則三光照形列曜削戹形神炁命不罹殞傷得制魔眞文而施行之則北酆畏威萬魔束首百邪敬慄弗敢侵馘得制水眞文而施行之則萬龍保身水府欽畏劫壞之日可跨蛟蚪而越九霄吁神功妙用果可度量哉但施行之訣别有祕要非世人皆可獲此效也惟學仙之士當倣其訣而服行之故經曰有得之子保萬炁長存勤行修奉刻致神仙臣旣職校經不敢不舉其要以吿來者伏乞上聖垂鑒臣良謹言洞玄靈寳玉皇功徳品第三爾時玉虚上帝白天尊言唯願慈悲願爲四衆帝釋等及四梵天王一切諸天一切諸仙及未來一切衆生持是經人説利益事爾時天尊吿玉虚上帝言快哉斯問不亦善乎汝以慈悲愍念衆生故請問於我天尊言曰若有三界十方無量國土及國王大臣或兵戈並起疫氣大行水旱蟲蝗凶災饑饉是其國君后妃太子宰輔大臣當發慈悲爲其黎庶徧敕國内州縣鎭宰令諸道流清淨嚴潔于其觀内設大齋醮六時行道爲轉此經當得國土清平五榖豐熟黎庶安泰臣謹言曰世有言曰干羽不足以釋圍鄕飲不足以息戰此事理之當然者也夫剽悍禍賊始從事於干戈㓂賊姦宄始容心於兵革非智術有以過之勇力有以勝之決未可以挫其威虐也乃今玉帝經中謂干戈並起之難當敕國内臣庶命道流誦眞經以息之何其迂誕也哉吁是大不然也夫天變上臨則地禍下作干戈兵革莫非自夫隂陽拂逆躔度汨亂乃始流災而起亂今觀徃昔之圖讖則可驗也是以經中之訓俾國家值亂則以斯而禳援蓋所以請命上天消天變而息地禍非謂以斯經而止亂也若夫厲兵秣馬髙城深池寧可一日廢哉昔有庸君識見窒昧乃直謂釋老經呪可以禦敵旋罹禍難至貽哂誚迄今爲羞良可嘆也今世昧夫凡覩是經率執此爲謗毀之自敢因校經而辯之臣良謹言若復有人入諸山林遇毒惡獸但能存想一念眞經山神衞護猛獸自退終不害己若入江入海採寳求珍值遇惡風如法持念是此眞經風浪頓止安穩逹岸若在軍陣戈戟旣接雨刃相交存心黙念是此眞經是諸惡賊悉自退散若在牢獄枷鎖之中淨心定慮存念眞經冤枉自伸即得解脫若爲邪精鬼賊衆苦所加如法持念是此眞經衆邪逺避自然除愈若人爲求嗣息如法尊重持念此經帝敕天曹明撿丹籍九品之内四果仙人運應數合降謫下生爲其作子才辯明慧人中尊貴若婦人臨難之月如法持念是此眞經即得母子平安生福德男女人所愛敬若爲求官進職爵䘵亨逹貴遇人君如法持念是此眞經即得職務遷轉子孫榮遇世世不絶若人欲求資財殷富如法奉持是此眞經即得財寳充溢衣食自然慶流子孫傅之萬世若人被諸惡星之所照臨困苦牀枕如法持念是此眞經是諸惡星返降吉祥若人命過應入地獄注名惡籍父毋師長夫妻男女當爲亡人持念眞經或安置道場旙花供養即得亡者鬼籍盡除神生淨土同苦罪衆咸蒙䕶度承斯勝利皆生天上又此經所在之處常有十天至眞大聖無極飛天神王侍衛供飬持是經人當得日稱爲正一眞人是人在處自得十方至眞至聖金剛力士澘護其人如䕶己身若出若入遊行之處百邪避路魔鬼殄除精靈伏藏一切災殃不能侵近是持經人命欲終時更不見諸地獄惡相即見天宮一切玉女持幢下迎而生天上如天福盡下降人間即得千生萬生中常爲帝王令國土清平人民樂業兼得爲王獲宿性通遵奉大道展轉修持至登道岸是持經人獲福如是又若有持是經人若雨下時起大悲心如法向空念此經三卷一徧其雨所霑面所向方一切衆生五逆十惡一切重罪悉皆消滅一切重病便得痊愈是諸衆生命終之後不墮地獄神生淨土蓮花化生何況持是經者又若有持是經人若行於道路值大風起吹是持經之人觸身之塵是塵所霑一切衆生一如惡業悉皆滅盡更不墮三惡道當生天上故知持經功德不可思議是持經人若在江在河在海沐浴其身是水所霑其中衆生魚鼈鼋鼍一切水族是諸衆罪悉得除滅盡此一報之身命過之後更不受胎卵濕化一切等身是持經人口出一切語言或善或惡一切天魔外道聞者皆是清浄法音是持經人若遇諸神廟能爲其神誦詠是經是諸鬼神得聞是經即脱鬼趣登眞仙道恭敬是人如奉是帝若人在世不孝父母不敬三寳殺生偷盜邪淫妄語作種種極重罪業將命終時若有道心正信衆生于是亡者未氣斷時起大悲心于其頭邊念帝尊號或一七二七三七四七乃至百徧千徧是其亡者生前所造諸不善業悉得消滅更不墮諸惡趣神昇九天何況受持是此經者又若復有人自從徃劫乃至今身輪轉人天漂沈世域積千愆萬過在於己身若遇是持經人影暫映其身如爲帝光之所攝受或與同語或聞其聲如奉帝言道語慰諭彼人罪障永得除滅又若持是經人造作長旛書帝名號于其旛上懸諸長竿或是觀宇或在家庭是旛被諸風吹所指方面一切衆生皆霑勝利一切惡業悉得除滅又若有持是經人書帝名號在一切有聲物上或鐘或磬鈴鐸鐃鈸一切道具法事之屬或以道場或以戲擊或被風觸是聲出時或遠或近一切衆生聞是聲已所有罪障悉得清淨又若有持是經人了悟生死深入山林修眞學道或時登臨上山顧望目所及處山林溪谷含生品類有形無形胎卵濕化動植飛潜種種諸類所有罪業永得除滅身心清淨命終生天何況受持是此經者當知是人即是道藏功德身也臣謹言曰天尊之語實而不虛眞而不妄其片辭隻字曷嘗若發几世昧者識未通眞見不詣遠或於諸經荀有少可議則遂從而疑之以爲世無是理也鳴呼是人也奚不詳觀熟究耽研咀味而曲求其旨哉功徳品中天尊說持經之人所得功德如所謂死而生天天福之盡當得千生萬生中可爲帝王與夫持經之人誦經於雨下之時涉途於風起之際至於沐於水觀於山現於影能畀一切衆生罪惡消除獲大功徳以爲無有是理彼蓋謂帝王之福高而無踰非誦經之功可得而獲證也况千生萬生常爲帝王乎彼又謂誦經之福及一身可也衆生極重過悪四生積愆受報此天憲之確纖毫不移使經百劫而不亡果報猶當自受焉可以誦經之身一歷其所而頓能解脫且獲福徳也哉斯人之語蓋知其一而未知其二也且夫行堯之行即堯之身希顏之人亦顔之徒今有人焉於是經也朝於斯夕於斯趨亦趨步亦歩於本行經中誦其言行其事咀其華含其英倣十大妙行而服行之敬斷障諸戒而離遠之守之以堅持之以誠愈久而不渝受撓而不變日漸月漬混然與玉帝之身如岀於一或陟或降在帝左右則彼身乃帝身也帝身亦彼身也身旣混融則功德之成豈有異哉玉帝放光神化若是之廣且大則今兹誦經之人所歷所至其福蔭衆生亦猶帝恩帝光之所暨及也雖然斯言也天尊謂誦持斯經而純與帝合者矣非謂入耳出口徒曰誦念者言也然而自入耳岀口誦念不替充而至於與帝之合則正一眞人之自稱殆亦未可以表其德操也學士宜思而行之臣良謹言爾時天尊謂玉虚上帝言今我略説未盡其妙若廣説之凡流邪見疑惑不信是經功德窮劫難言爾時玉虚上帝聞是說已心生歡喜不勝踊躍瞻仰慈颜稽首而作頌曰九天之上謂之大羅玉京金闕雲層峩峩中有天帝仁慈惠和至道無敵降伏衆魔天寳靈符玉律金科神仙億萬幢旙衆多聞者罪滅永出愛河是號玉皇穹蒼眞老妙圓清浄智慧辯才至道至尊三界師混元祖無能勝主四生慈父高天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦爾時玉虛上帝説是頌及十號已是諸天衆異口同音歎未會有臣謹言曰事恱於心辭溢於外故玉虛上帝之讃推尊稱頌極言苦談求有以盡玉帝之徳吁帝德之大其可言盡哉臣敢以不言爲稱讃庶與玉虚上帝相表裏云臣良謹言高上玉皇本行集經卷中
