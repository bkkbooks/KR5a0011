front:
  text: 高上玉皇本行集經卷上
  hash: sha256:ca20e2f465404f5a911f3d0d358e193742cb7058eb987a5b7d2622a050378d72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0011_HFL_001-001a, image: hfl/0023/0023-096.png}
body:
  text: 天樞上相臣張良校正清微天宮神通品第一道言元始天尊昔在清微天中玉京金闕七寳玄苑玉皇宮殿昇光眀座與無鞅數衆宣說靈寳清淨眞一不二法門右應運說法章並已詳校略無舛誤臣謹言曰大道之妙始於無始窮於無窮器形不可囿也見聞不可即也三界有形欲造斯道將奚所自耶臣恭惟元始天尊知大道之高玄憫生靈之冥晦撫機應運大闡法門而示之俾三界生靈由是門求道庶乎茫然蠢動俱可以即夫清淨眞一之門而復至於虚無自然之域也結經衆眞將欲紀述天尊宣說法門之迹故述是章爲首雖然是經始终純紀玉帝神變生化之實而結經之眞乃直指爲宣說靈寳清淨眞一不二法門非靈機洞悟心印相符者疇克爾哉敬重宣化義以告來者伏乞上聖垂鑒云臣良謹言是時玉皇尊帝與諸眞聖眞聖一本云天眞飛天大聖無極神王靈童玉女九千萬人清齋建節侍在側焉右乘機與㑹章並已詳校略無舛誤臣謹言曰上聖之心一而不二上聖之迹同而不殊故天尊方即七寳玄苑登光眀座爲欲說經未始出一玄言而有所詔召也乃蒙玉帝心黙契遇與諸大聖㑹於不約豈非心一而不二迹同而不殊者哉深恐下方衆生未逹斯理敢以是告伏乞上聖垂鑒臣良謹言于是玉帝知時欲至即於㑹前舉六通力放大光明徧照諸天無極梵刹一切境界皆大震動十方無極一切世界俱同瑠璃玻瓈無有隔礙右知時放光章並已詳校略無舛誤臣謹言曰崇卑奠位遐邇殊方位奠方殊體勢斯異非有統一其應豈同恭惟玉帝張主萬天總御諸地故於斯日特放光眀照燭諸方震動一切俾夫含識俱起覺知乘際妙緣霑沐道貺然而神光妙義世舉未知敢泄玄機普施無量夫光明者即道性也蠢動含生無一不具特以上聖則修鍊融混全乎至精蠢動含生則流蕩沈迷失其至寳故上聖至精之全則光色明耀含生至寳之失則沈墜暗冥上聖一以同有之道性運神變以燭之則彼同有道性之含生莫不警聳而動悟是以神光一發充滿法界而法界萬有莫不震動而警悟也以性合性妙用如斯學者以是求之伏乞上聖垂鑒臣良謹言十方來衆並乗五色瓊輪琅輿碧輦九色玄龍十絶羽蓋麟舞鳳唱嘯歌嗈嗈靈妃散花金童揚煙讃謡洞章浮空而來右十方來集章並已詳校略無舛誤臣謹言曰以勢而論十方固殊以形而言萬聖赤異然而物我同體賢聖豈殊遠邇等觀方隅奚限天尊説經玉帝放光而十方之衆普皆來集理勢然也萬有生靈宜各知之臣良謹言是時梵天一切金仙大乘菩薩四衆八部承斯光照皆乘碧霞九靈流景飛雲玉輿慶霄四㑹三辰吐芳飛香八湊旋繞道前雨衆妙花如雲而下徧覆會前右金仙普至章並已參校略無舛誤臣謹言曰道出于一教或有異出于一者宗也或有異者派也自派求宗異乃合一又奚可差別哉今人世以道釋爲殊途不啻朱墨豈知道釋同乎一宗初無少異故天尊說經玉帝放光而金仙之衆並獲與會此蓋聖眞同心道釋同宗也人世其知之臣良謹言是時其光徧照諸天下燭下方無極世界同玄都境凡彼人間上近九天通接交連至親至邇時彼下方無極世界山陵坡坂溝澗谿谷緬平如掌六合至邇三境非遼天寳臺殿星羅人間瓊瑰羅列朗耀雲衢七寳欄楯以界道路玉𣗳仙花蒨璨珠寳景秀丹田芝草覆綿時彼下方皆見諸天鈞天妙樂隨光旋轉自然振響又復皆見鸞嘯鳳唱飛鳴應節龍戲麟盤翔舞天端諸天寳花零亂散落徧滿道路右光照下方章臣𥩈謂自天上而視人間則天上此也人間彼也今凡本云令此人間上近九天是彼此不辨又神光所燭自然上下貫通混融無際今凡本以今爲言者是强使之然非自然也謹更令此爲凡彼又時此下方亦謹更爲時彼至如凡本云又復令見鸞嘯鳳唱其間令字亦是强然今更令字爲皆字臣竊謂經乃天文非世所有緣天眞降世口授下方諸仙彼下方諸仙憶而筆之下仙自人世而言故多言此字或其間雜有不安之語是亦無足怪也臣今更之欲俾文義大正恐人世未知故詳述于此誦持之士母諸他疑臣謹言曰以鏡燭物有形者皆現以灰覆物不潔者皆鮮況以上帝無礙平等神通之光照燭一切宜乎俯仰一知無彼此逺近之間也舍生能體玉帝放光之事混物我一親踈等善惡蔑夷險俾此心光如玉帝無礙平等之光則心光之發殆脗符於帝光也事上求理初無誑誣有生其知之臣良謹言是時凡聖駭異幽暗開光天人恱慶踊躍歡忻凡夫學士盡得飛昇仰觀刼仞寳臺俯眄紫雲彌羅是諸世界一切人民咸臻道氣白首面皺皆得化度紺髮朱顔少壯幼穉轉得形容光澤美好苦惱痊平普蒙解脫安樂快然天下歌謡欣國太平右神通感效章臣竊見光照下方之後當即覩效異之著今凡本中略有舛異致意義弗貫謹移是時二字於凡聖駭異之上又人民旣至於安樂快然則天下斯至大治矣謹移天下歌謡欣國太平八字於安樂快然之下其餘神風遐著等語乃神化玄功著見於幽冥之際非特明及人間也故移置下章臣謹言曰幽顯雖殊理致不異以人間帝王徳音之下則死者生罪者釋黜者復降者升尊者益榮顯者愈貴是特帝王恩澤之所加也況上帝神光之降是謂非常之恩則彼學者昇仙老者反壯少者皆强病者獲痊亦當然之理也含生宜勉奉聖眞勤希道學佇玉帝之覃恩焉道不負人聖有明訓其謹信之臣良謹言當爾之時神風遐著萬氣揚津天震地裂枯骨更生沈尸飛魄皆起復形酆都鐡圍長夜九幽即時破壞地獄衆生化生諸天三惡道苦一切解脫時諸罪輩以斯光力得生十方諸大天宮右枯朽化生章臣竊謂神化道用及物雖均然亦不無逺近先後之敘故神光照世之效先及夫明明之人間然後及夫冥冥之諸類此自然之敘也舊凡本中所紀頗有不次臣今輒移當爾之時字冠於神風遐著之上次以酆都鐡圍等語接於皆起復形之下俾光後之敘不紊而旨意脈絡貫通庶乎不失曩日説經之時目見之實迹也又舊經中有生諸天已之語今亦削之臣謹言曰枯骨當朽沈尸當壞惡趣當囚此常理也然帝恩非常不可以常理論含生不可謂有惡有過當有原宥生天之日而或萌僥倖之心倖心一生則反受幽囚也事有可畏故首爲言之然當復眀祐起囚出之義夫罪趣之沈非本沈也蓋以含生積惡過重業集故地獄之報有不容脱一受眞恩自宜超化矧逢玉帝放光之事恩宥非常則過惡盡釋如湯沃氷以其元始一靈乘陽光而上九天決非難事也若夫枯骨沈尸之生起則當假喻以明之夫𩹫骨腐於泥得水而再活并萍燥於地得水亦復萌水特一物魚萍得之猶且若是矧上帝非常之恩乎且尸者人之化者也骨者尸之削者也骨乃尸尸乃人人受天地隂陽之氣而生焉可以骨而况物哉蓋骨者精之所化也今學人能鍊精則精化爲金玉之丹而留形住世長生神仙彼骨乃精之化宜其有異於凡物也是以萬物得土則朞年而腐惟人之骨殖久入土而不化焉此由精之所化而然也故上聖慈悲有太隂鍊形之術吁不能度之於旣生而猶欲活之於已死其慈悲行願若此其至也哉今兹上帝放光俾囚脫尸起以至於枯骨更生則上聖好生之德將奚以報之也茍有少負羅酆鐵圍其可逃哉含生宜知之臣良謹言爾時玉皇即分其身徧於十方諸大天宮令諸天宮自然化現白玉爲京黄金爲闕七寳玄苑大光眀殿具光明座幢節旛蓋異寳奇花徧布是處右分身化現章並已詳校略無舛誤臣謹言曰道體猶虚空空無所不有豈容限以一隅哉夫月現于空凡有水處影無不沈也雷震于天凡可聞處聲無不徹也玉帝妙道眞身譬之虚空無所不在豈雷與月之可比哉又豈待分之而復徧現諸天地哉然衆生眼根依物乃轉故玉帝揭示身相之分俾一切有情隨相瞻視攝念歸依佇聽妙法是以徧於諸天各現一相諸天之衆各爲景慕然後隨方說法普受萬靈吁知玉帝道身之一而不知其分則見有所膠而不融知玉帝道身之分而不知其一則識至於亂而無統是一非一是分非分隱顯聚散冥寂玄通茲乃玉帝分現之微旨也含生其思之臣良謹言爾時玉皇即以所分之身徧於是處白玉京中黄金闕内七寳玄苑大光明殿光明座上普爲十方演說清淨解脫之道右分演妙道章並已詳校略無舛誤臣謹言曰濁世衆生不悟眞道是以七情六欲縱而不收萬過千愆積而不解地獄之報目瞑不逃豈意上帝之慈敷恩赦度俾之徑陟淨境快樂無涯然豈知積福生天福盡猶不免於復墜況承恩而生則生天之縁直以恩之所及也茍昩進脩曷爲解脫玉帝聖恩優渥猶欲終俾解脫故爲宣說清淨之道俾諸天人獲究竟之果吁慈澤混浩慈意深逺天人其可不勉自進趣以副玉帝接度之意乎人世衆生宜思玉帝赦度拯接苦趣之迹勉勉爲善勿自暴棄則帝恩之降殆不止若是也雖然是章載玉帝爲天人說清淨解脱之道而以下諸章並不見玉帝所說清淨解脫之語何也蓋玉帝以一切玉女侍衛而玉女眞身流香黙寓清淨解脱之旨以至於諸趣承光覺悟及妙音宣演等事莫非清淨解脱之意是乃玉帝不言之言也結經諸眞黙識是義直紀普爲十方演說清淨解脫之道吁識洞帝心見徹事外結經之眞其造妙通玄有如此者誠不可思議也夫誦經之士其因兹而求之臣良謹言時化玉帝各以無量天眞大聖妙行眞人靈妃玉女侍列左右是諸玉女顔容殊妙端嚴竒特天珍異寳謂天上之珍竒異之寳也舊本以天珍爲天眞今更正之莊嚴身相言音清徹衆所樂聞如是諸女其身復出微妙解脫自然之香是香芬馥周徧諸天舊本云能徧諸天夫玉女身香之出自然充滿法界若以能字加於徧字之上則能乃强然也今正其誤爲周字極妙樂土及餘大地一切福處六道一切衆生一本云能令六道一切衆生夫六道苦趣自然聞香初非强使聞之也今正其誤削此能令二字聞是香者普蒙開度所謂天道人道魔道地獄道餓鬼道畜生道舊本畜生道下有當此已後四字夫玉女岀香六道於當時得聞初非在此以後也仲仙口傳紀録有誤今削當此已後四字若諸天道一切天人或有能聞是此香者五衰之相永得滅除轉增天福若諸人道王臣兆庶或有能聞是此香者即得人天長夀之樂身或滅度及得脫殻尸解之道若諸魔道一切諸魔或有能聞是此香者安處天宫鬬戰之苦各得休息若諸地獄道一切衆生或有能聞是此香者離地獄苦得淨土樂若諸餓鬼道一切餓鬼等舊本云一切餓鬼神等臣竊謂神趣雖有亦墮餓鬼道者然旣墮鬼趣即是鬼矣今著神字似礙神祗之神謹削此一字或有能聞是此香者即得飽滿無飢渴惱若諸畜生道一切畜生舊本云一切衆生前地獄言衆生今此畜生道之下當作畜生今有間别故易衆字爲畜字或有能聞是此香者脫畜生苦得智慧樂右聞香解脫章並已詳校更正訖臣謹言曰理之常者衆人之所共知理之異者雖腎哲亦或未悟也臣於聞香解脱章敢悉鄙見以吿人世云臣竊見玉帝於七寳玄苑放光之初下方人民地獄苦趣並承光照已皆生天矣今經於玉帝分身普現之後復載玉帝分現之時以諸大聖玉女侍衞又載玉女身香徧於是處而六道衆生聞香者莫不解脫世人之疑諸人民苦趣旣以帝光而生天用生天之事是帝光之效也奚與於玉女之身香乎吁此疑議非人世之罪也蓋事岀於常理之外有不容不疑奚足怪哉臣謹明之以釋世人之惑恭惟天尊今兹說經正爲欲發明清淨之法門也夫女人之身純隂之質也惟其純隂故常與不淨爲鄰惟其鄰於不淨故其身鮮有芬馥之致乃今一切玉女能與玉帝行解見識等並同清淨故其身雖純隂鄰於不淨而微妙解脫自然之香乃岀於其身譬之世人處於濁惡苟能俾心見識行等悉處淨鄉則異香之微妙解脫亦當生於其身也此經專以清淨眞一解脫爲主故結經衆眞専紀玉女身香一事發明妙旨雖然香雖名香要當以理論不可著物而言也凡人之身茍無過無咎知道悟眞凡出一言行一行爲衆人之所欣羡讃歎則亦猶玉女之身不濁不穢有微妙解脫之香爲諸天福處之所聞玉女譬之則燭身也香譬之則我之言行也香徧於諸天福處譬之則言行發見於千里之外也六道聞香而解脫譬之善言善行見用於世而利益於人物也此乃修行之徑含生其味而行之妄揣若兹言略意窒仰惟上聖鑒之人世信之臣良謹言爾時諸生天罪衆旣得生是勝天宮已緣承慈光攝受之故便自覺悟各各明了罪福因緣與諸眷屬作天伎樂來詣帝前是諸衆等各各含悲俱發聲言前後經千劫萬劫不見三光常處黑闇三惡道中多受苦惱伏蒙上帝方便放光愍救我等皆生天上是諸惡業悉皆滅盡無諸繫滯皆得徃生仰朝上帝各到道前是諸生天一切罪衆說是語已稽首復位右承光覺悟章並已參校略無舛誤臣謹言曰衆生障重業識昏迷積惡累愆至墮地獄彼時雖悔將何及哉一旦忽受天恩非但得脫苦趣且獲徑生天宮此之幸會億載一逢事岀望外其喜豈有涯際哉今雖離苦得樂實爲慶幸然不若在世之日直累善緣徑升樂地之爲愈也世之衆生當勤種善果勤求眞道母俾旣墮地獄方覬天恩以求解脫縱使天恩果得則此身已受衆苦殊爲可痛念也衆生宜思之臣良謹言爾時玉帝出大妙音普告十方諸天聖衆汝等諦聽此諸罪輩曠劫以來縱無明性造十惡業六塵徧染三業縈纏肆意任心會無覺悟隂罪陽過日積月深背道違眞順邪棄正舉心運念動結愆尤遂使命過之後身落三途不得解脫若非今日遇是法筵何由岀離右妙音開度章並已詳校略無舛誤惟是舊本妙音一章係在移接天人之後臣伏見玉帝分現之後六起聞香解脫承光覺悟各了宿縁於是玉帝乃出妙音再垂重訓以堅修進然後移接天人同現元始奮本以上眞降傳下仙紀録次序頗紊臣今輒行遷證庶獲貫穿臣謹言曰臣嘗聞之經曰生我者神殺我者心故嘗詳味妙義然後知心之爲用其爲害與利不可勝言也夫人生之初特神之寓未嘗有是心也迨夫四大混合神凝爲心心以神寓即爲離本矣心爲離本而心又生念一念旣著則百爲以生百爲旣生則萬罪萬善於是發萌矣是以斯念之起適於善者則功德以成適於惡者則罪惡以就此無他一心之生故也今觀六趣之墜初非係於别法之導指特在舉心運念之不純故愆尤之結以至於三途久墮不獲超離若夫三業之縈六塵之染初非離於一心之生一念之起也玉帝誕敷弘恩接度諸趣深恐諸趣承恩超離根念未固不能進脩特出妙音爲明沈淪之自俾六趣灼識大本不復迷沈是皆慈意恢洪故屑屑不厭也俗世人民當即帝之妙音堅持禁戒勿俾干犯則升天證果不啻反掌如或慢忽自縱有拂妙音之戒則沈落苦海將猶立板而走丸不可復反也毋謂帝恩之渥常可得之臣良謹言爾時諸天化身上帝即以神通不動其所接移天人皆令得至清微天宫玉清聖境元始㑹下是諸等衆不覺不知是時天尊衆㑹見是十方玉帝化身普皆來集天尊㑹前如無邊明鏡照諸影像互相容入時諸大衆稽首瞻仰上帝化身聖中最雄增長清信益加志樂心無退轉起大堅固時諸天人邇得生天忽覩天尊勝會道場清淨第一無爲功德之所莊嚴踊躍歡喜一時作禮歎未會有右移接天人章並已參校略無舛誤臣謹言曰法性平等廣大無量增之不益削之不欠近之不邇逺之不遐曰聖曰眞曰天曰人初未嘗有異也奈何衆生具體離本去原毫釐一差千里之謬是以崇卑頓異凡聖逈殊彼此相窺億萬有間今玉帝覃恩度移苦趣皆俾超昇雖妙音之岀爲明罪本旣詳且盡然猶慮諸趣未體法性之妙故現異境示以法性無礙之實故不動其所移接天人俾至元始㑹下自諸天而觀則元始之㑹逺在極尊之域自元始會下而觀則諸天之境亦逺在至卑之地今玉帝不動其所俾諸天元始之境如指掌中瞭然在目豈非法性妙用天人一理崇卑一致哉修學之士宜即移接一章參味玄奥則性中天地心内聖凡和㑹混融廣博無礙是不特下仙修證之比也道不負人宜加勤焉臣良謹言爾時十方諸化玉皇俱復一體從法席起向北長跪天尊言曰徃昔去世有國名號光嚴妙樂其國王者名曰淨德時王有后名寳月光其王無嗣帝因一日作是思惟我今將老而無太子身或崩滅社稷九廟委付何人作是念已即便敕下詔諸道衆於諸宮殿依諸科教懸諸旙藎清淨嚴潔廣陳供養六時行道徧禱眞聖已經半載不退初心忽夜寳月光皇后夢太上道君與諸至眞金姿玉質清淨之儔駕五色龍輿擁耀景旌蔭眀霞蓋是時太上道君安坐龍輿抱一嬰兒身諸毛孔放百億光照諸宫殿作百寳色幢節前導浮空而來是時皇后心生歡喜恭敬接禮長跪道前白道君言今王無嗣願乞此子爲社稷主伏願慈悲哀愍聽許爾時道君答皇后言願特賜汝是時皇后禮謝道君而乃收之皇后收已便從夢歸覺而有孕懷胎一年于丙午歳正月九日午時誕于王宫當生之時身寳光燄充滿王國色相妙好觀者無厭幼而敏慧長而慈善于其國中所有庫藏一切財寳盡將散施窮乏困苦鰥寡孤獨無所依怙饑饉癃殘一切衆生仁愛和遜歌謡有道化及遐方天下仰從歸仁太子父王加慶當爾之後王忽告崩太子治政俯念浮生告敕大臣嗣位有道遂捨其國於普明香嚴山中修道功成超度過是劫已歷八百劫身常捨其國爲羣生故割愛學道於此後經八百劫行藥治病拯救衆生令其安樂此劫盡已又歷八百劫廣行方便啓諸道藏演說靈章恢宣正化敷揚神功助國救人自幽及顯過此已後再歷八百劫亡身殞命行忍辱故捨已血肉知是修行三千二百劫始證金仙號曰清淨自然覺王如來教諸菩薩頓悟大乗正宗漸入虚無妙道知是修行又經億劫始證玉帝說是語已法筵清衆異口同聲歎未會有右化生本行章並已參校略無舛誤臣謹言曰無上大因縁大功德自無始以來未有如玉帝化生一事也天尊爲是因縁功德特建微妙道場顯示三界是以先俾玉帝放光現大神化然後敷宣祕宻詳述化生本行故玉帝於移接天人之後自分而合返本還元現無上道身上朝元始朝謁之時初未嘗岀一語以白天尊也天尊玉帝心光混融非一非二故玉帝北向跪奉朝儀而金口妙言即宣本行自今觀之以帝身而分現諸天即眞一應化也以分現諸身而合爲一體即眞一不動也天尊建微妙道場是欲宣演大因縁功德也金口宣演化生本行是欲俾三界萬生知玉帝因縁功德之大而倣傚進修也眞一不二法門即此是也清浄解脱之道亦此是也含生宜現玉帝化生修累之事而勉建無上之玄功則功德巍魏也又觀玉帝自一而分自分而一則可以造眞一不二之門而成無上道也儻能不憚辛苦自一時以至於四時自一年以至於百年自一生以至於多生自一劫以至於億劫堅勤不退則凡身濁質離垢成眞大彌羅天當爲汝鋪張分位俾汝登證也列侍三境進事玉帝又奚難矣哉含生及修行之士宜諦思之臣良謹言爾時衆中有一玉女名曰夜光從座而起嚴整衣冠從容雅歩長跪道前白天尊言臣宿昔何幸仰侍御前親奉供飬已經億劫三清境界金闕玉京寂淡逍遥快樂自在嬉遊聖域餐聽法音未㑹見此希有之事不審向來光内所現十方諸天變現聖境皆有上帝應化法身天眞大聖妙行眞人靈妃玉女以爲侍衞是諸玉女相貌端嚴形體殊妙無與等者復蒙上帝神通移接今皆普集在清微天未審今此玉女以何因緣得證如是無上色身思惟聖慈示以未悟爾時天尊謂夜光玉女言汝固初入聖流雖有智慧未能明了此諸玉女乃自徃昔無量劫中修諸妙行具解脫門同清淨信同清淨解同清淨念同清淨行同清淨身同清淨心同清淨意同清淨果同清淨報同大慈心同大悲心覆䕶衆生如毋撫念愛於赤子奉戒專一冥心大道清齋弘誓千萬劫中尊奉玉帝此諸玉女非實是女皆天至眞爲度羣生現玉女身是故身色神通智慧隱顯變化與帝同焉爾時夜光聞是說已心得開悟稽首歡喜黙然復位右玉女妙行章並已參校略無舛誤臣謹言曰諺云人不知身爲聖馬不知身爲龍誠哉是言也夫玉女之身純隂之質也純隂近乎濁宜乎進修之難於清淨也今玉女以其修諸妙行遂能具解脫門夫所謂具云者無所不解脫也然原其所以具解脫門之自則始於修諸妙行而妙行之修又根本於大慈大悲之心與夫所信所解曰念曰行曰身曰心曰意並由清淨故其果其報莫不清淨以至於解脫之具焉吁玉女隂濁之身能慈悲清淨修諸妙行而能至於解脫仰侍玉帝且又身色神通智慧隱顯變化與帝一同甚而至於俾六道苦趣聞其身香而亦臻解脱則妙行之修其功德果報一何崇大廣博也哉斯世之人凡受中稟氣皆自元始初未嘗異於玉女也苟能修諸妙行俾與玉女不異則後之起證又焉與玉女異哉含生宜黽勉倣此而修之若夫前章言玉帝爲十方之衆演說清淨解脫之道即此是也玉帝有不言之言并宜思之臣良謹言爾時高虚清明天主與諸天眷屬馭八景鸞輿九光寳蓋奏玄歌妙樂詠無量洞章散天寳花噴天眞香飛歩遊空來詣道前承天尊上帝威神之力是諸寳花即於空中化一寳蓋蔭覆大衆無不周徧是時高虚清明天主見此希有稽首長跪白天尊上帝言賤臣懈怠後會法筵今日吉慶興此法橋幽顯凡聖普霑聖澤放大光明現希有相上照諸天四梵六慾一切樂土諸眞聖衆覩此光明皆悉雲集下照十方無極世界同玄都境近接九天靈風奏樂宮商相和激朗雲庭皆成洞章一切衆生咸臻道化酆都鐡圍長夜九幽一切地獄受苦衆生盡承光力皆生諸天得受快樂令臣所散天寳竒花旋結成蓋徧覆大衆盡乃斯光威神之力臣等千劫良因九天運㑹皇道蕩蕩正法興隆今日大吉咸仰玄功是時高虚清明天主以讃上帝曰金闕玄穹祖高上玉皇尊妙相冠諸天慈光燭三界眞聖妙道師天人依仗師大乘垂法語眞一指迷徒功徳若虚空讃揚無窮盡是穹蒼主浩劫之尊妙見妙知無等無倫湛寂眞淨杳亡杳存上聖上靈大神通光明藏大丈夫開化人天教道無窮大慈大悲流煥法輪爲度羣生是號玉皇穹蒼眞老妙圓清淨智慧辯才至道至尊開度衆生故演是光右天主讃仰章並已參校略無舛誤臣謹言曰玉帝功德之大言辭不可讃也譬喻不可盡也雖以塵沙界中無量天人身具萬舌美之讃之皆不可窮況以一人之舌讃美之哉今高虚清明天主以偈讃歎是蓋恐三界萬生猶有未知玉帝之功德者也模做隂陽之眞形繪畫日月之神光雖良工決不可以用其巧矧帝之功德崇大廣博容可言揚哉雖然天主之偈美則美矣至則至矣雖猶未足以形容帝德之萬一矣然天主之意蓋欲託此而啓金口無盡之言故偈頌稱讃不辭縷復天尊察知其誠故於後章繼有聖訓云臣良謹言爾時高虚清明天主說偈讃歎已天尊普告四衆云是帝身即道身也非常體也是無量功德之身是清淨自然之身是神明堅固不壞眞空無上法身威靈恢廓名聲周徧無幽不開神竒堂堂難可稱焉是帝非有爲功德之所熏修而帝昔雖下生人間多劫行化示大神通而身清淨未嘗不在金闕分身變化應現隨方利濟羣生超昇道岸普垂教法開悟後人依按奉行登眞成道以斯功德之所莊嚴是故光明常充諸天神智妙逹莫可度量是身光明皆具妙號所謂大神通光大慈悲光大喜捨光大忍辱光大平等光大柔和光大自在光大利益光大如意光大智慧光大吉祥光大解脱光大歸依光大功德光大圓滿光大無礙光無能勝光是故汝等欲見是帝乃不可得者縁以汝等尚於身口不捨結習煩惱行業由是障故不能得覩是帝慈顔吾今爲汝時㑹衆等宣示斷障之法汝等大衆各宜奉行時諸大衆不勝喜躍各于至尊几前稽首作禮俱欲願聞天尊言曰斷障之法當生大悲無起疑惑無起貪嗔無起淫慾無起嫉妬無起殺害無起凡情無起凡思無起貪妬無起聲色無起是非無起憎愛無起分别無起高慢無起執著凝神澄慮萬神調伏心若太虚内外貞白無所不容無所不納無令外邪亂其至道牽失眞宗敗其靈根盜其至寳致爾萬劫永墮凡流透入俗網萬魔來攻百千萬劫不聞妙法鬼神執誅從生入死是故汝等應當志心善護眞宗無令喪失如前所説如是諸障汝等各各當除斷之身得清淨超度諸難是名道寳持法棟梁更當修奉是此經典如近是帝生尊重心著想尊容稱揚名號然後汝等得覩慈顔咸蒙護度普聞妙法親奉供養永無流轉是時四衆聞已歡喜歎末會有右垂教斷障章並已參校略無舛誤臣謹言曰經者徑也修行之路也凡人奉經有二法門一曰口誦一曰心持口誦者謂以口業稱揚也心持者謂以意業遵行也口誦者當以心持爲本心持者當以口誦爲先心口相資功德乃就舉一廢一功德不成故經中合言誦持也誦而不持是言譊譊而心無益也持而不誦是心雖動而意不逹也是必二者並舉事乃成焉此誦持之說也若夫誦持玉帝之經是當遵行帝之功德倣慕帝之修證而後可也遵行倣慕有五法門一曰尊重景慕二曰懴斷障業三曰積功利濟四曰含容明通五曰眞一變化所謂尊重景慕者經中所謂著想尊容造帝形像稱揚名號誦念經訓是也所謂懴斷障業者經中所謂斷障之法備載諸說是也積功利濟者經中所謂分身變化利濟人間敷揚教法等是也含容明通者經中所謂心若太虚無所不容無所不納慈悲方便是也眞一變化者經中所謂而身清淨常在金闕應現隨方是也人能按是五門勤而行之當證大彌羅天神仙之位行之三年萬神敬仰羣魔東形行之十年十方奉事神昇玉清行之二紀功滿德就身騰玉清旣登玉清乃證三身三身者經中所謂無量功徳之身清淨自然之身神明堅固不壞眞空無上法身也修學之士誦經之人宜味吾言而行之如口誦是經身犯諸戒經中妙音及斷障之法也則報應神驗品中具載其報學士誦人宜畏之敬之臣良謹言高上玉皇本行集經卷上
