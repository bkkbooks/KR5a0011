front:
  text: 高上玉皇本行集經盈四
  hash: sha256:e85871ed1a1148ee41b510c708955687f4f40b372801775e22474a7669337071
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0011_HFL_000-001a, image: hfl/0023/0023-084.png}
body:
  text: 三天門下校經詔文門下湛寂常道信擬議之至難恢漠神通豈形容之可盡凡寓讃揚之語庸昭誘導之門諒一時聞聽之差殊致諸仙流傳之舛異矧經世歷年之甚久故誦言作字之弗真曷嫌魚魯之成會奚怪鳥焉之為馬不有諟證寧免乖訛肆申命於文臣俾𥟵詳於聖典天樞上相張良宿專儒業今領樞司既命壇演化於南洲已出書度人於下界宜職討論之任倍隆參校之功副人世之誦持示天書之藴奧悉令誤戾咸至完全於戲道本心傳妙悟實由於言外義因言顯進修當自於經中可倍加審訂之思使無愧編修之寄并述參求之路誕彰造入之階庶真徒即此以求玄俾善士由茲而得道反其澆薄還此清淳俟畢奏陳當憑頒下故茲詔諭切可遵承右奉三清敕如前敕至準敕故牒年月日下林少華受蒼汝嘉付三天大丞相天樞上相辭表并所降請辭之意臣良上言昨恭準睿旨委臣良參評審訂玉皇尊經者臣良恭聞道妙難言豈在言語敷宣之悉經昭垂教要先教彰演述之詳是理孔明在人皆喻第念格言之當理無得而踰矧夫凡世之素承久則難變儻妄有一言之更革則不免萬姓之持疑宜不易於舊章庶弗生於他議且恨庸才之孱暗難於聖典以參詳敢干鼎鑊之誅上布肝腸之懇臣良誠惶誠恐𥟵首頓首重念臣良塵區微類濁世賤臣幸憑師匠之陶鎔獲遂仙曹之升擢謬以踈愚之質輒司樞要之權夙夜以思情誠交懼惟欲勉效於駑鈍求以茍逃於罪辜豈意睿慈特頒明詔綸言溫穆燠知春日之和玄旨雍容豈類秋霜之凛挈校經之重任俾效拙於祕詮顧此昏庸孰堪任使況聖語曲盡於至理而真經久漬於凡心時若卒更民焉盡信深懼無知之愚俗反萌不信之凡心或侮祕文將貽巨譴非但賤質有失職之誚弗免寶文為覆瓿之羞論至於斯事有可議臣愚欲望天光燭暗睿鑒知潛體察下誠特蠲重任或乞更命英哲掄擇巨能畀之討論庶無擬議臣良祗膺玉旨敢布狂言實非上拂於眷隆率以悉傾於意願罪當萬死恩望三清切丐斷自宸衷播告中外誓當勉揚臣職仰答寵光臣良干冒天威下情無任悚栗戰懼之至𥟵首頓首謹具表奏聞伏候敕旨謹奏年月日臣良上表三清再詔所奏備悉卿學貫百家道班列聖已領度人之職久專出書之權眷彼南洲之民素佩名理之誨顧本行集經適有於舛雜視下方黎庶各抱於迷疑肆議選掄特俾詳校宜祗膺於前詔再恭奉於兹言毋忽謙辭仰副責任故再詔諭切可欽承天樞上相發明誦持大義并述校經之意琅函積阜無非妙義之存寶蘊儲沙莫匪玄機之寓皆上聖憂人之切故祕言垂世之多雖千編萬軸不勝其繁然隻字片言即藴厥要苟解提綱而振領自然掘土而得金如或見昧粗精識迷徼妙不啻隔紗而視日奚殊認鹿以為牛直饒辛苦百年勤勞一世竟未逹穹玄之要妙豈能知混浩之機關要須心外攝心眼中著眼咀味至真之實忖惟太妙之根用能勘破玄中之玄卓領寂中之寂是謂嚼得龍肝鳳髓脫兹俗質凡軀自然升入無形頓超有漏神飛金闕優遊彌羅之天體合玉京左右穹蒼之主恭惟玉皇本行經者至真真體上聖聖機寓真一之妙於紀述之餘示解脫之門於讃揚之際辭意互攝理事交參言中包蓄於真玄更無隱奧語內鋪舒於微妙蔑有緘藏味之者神洽太和誦之者心離諸漏神功妙用廣博難量沖義靈機包羅無外第以衆生障重凡類識迷言上求言不貫為言之脈絡字間究字不參訂字之根苗徒求本行之始終豈悟至言之紀極遂至謾貪果報祗求立效之為神獨畏憲章昧謂鮮殃之得徴聖典固彰於異迹玄言本寓於真機曷容即粗以捨精宜勿著粗而離妙然後吻合天尊之本旨默符玉帝之宸衷進趣修行頓遠濁惡之世升騰超證高陪清淨之儔斯可造清微天登光明殿不勞玉帝妙音之再出穫詣天尊法門而泛遊具六神通得大自在斯乃始名於信受斯乃真號於誦持苟或萬遍譊譊不究真一之旨六根泛泛不投解脫之機是皆未可以仰酬天尊説經之勞未可以仰獲玉帝護經之續更咨敬信之士倍加持奉之功口誦心存如處玉光之內神交意晤如遊寶苑之中諦觀分身合身之神通靜想應化應物之妙用湛然無纍卓爾有憑即乃平步天宮列名聖籍臣良仰膺睿詔將讃寶經敬先敷露於鄙言于以宣告於當世至如護持功德之説報應神驗之詳已具成經不勞贅語若夫鋪張至理訂證誤文雖非謬才之可能幸以溫詔之所畀己嘗遜避弗許謙辭即當刳剔此心審正于下先作斯語肇闢于經庶畀來觀之人首認紀述之意臣良稽首頓首拜手謹書
